<style>
:root{
  --bg:#0a0a0e;--bg-2:#0f0f15;--card:#14141b;--card-2:#191921;
  --line:rgba(255,255,255,.08);--line-2:rgba(255,255,255,.05);
  --fg:#f3f3f5;--muted:#8a8a96;--muted-2:#a6a6b2;
  --gold:#d4a843;--gold-soft:#a8862e;--gold-dim:rgba(212,168,67,.12);
  --green:#26d07d;
  --radius:12px;--font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--fg);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

.header{position:sticky;top:0;z-index:50;background:rgba(10,10,14,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
.header-in{max-width:820px;margin:0 auto;padding:0 22px;height:64px;display:flex;align-items:center;gap:14px}
.brand{display:flex;align-items:center;gap:11px;flex-shrink:0}
.brand-mark{width:34px;height:34px;border-radius:9px;display:block;object-fit:cover}
.brand-word{font-weight:800;font-size:1rem;letter-spacing:-.01em}
.brand-word .g{color:var(--gold)}.brand-word .w{color:#fff}
.brand-mag{font-family:var(--mono);font-size:.62rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);display:block;margin-top:1px}
.back-link{margin-left:auto;font-size:.86rem;font-weight:600;color:var(--muted-2)}
.back-link:hover{color:var(--gold)}

.wrap{max-width:720px;margin:0 auto;padding:40px 22px 90px}

.state-box{padding:60px 20px;text-align:center;color:var(--muted)}
.state-box h2{color:var(--fg);font-size:1.3rem;margin-bottom:8px}
.state-box a{color:var(--gold);font-weight:600}

.kicker{font-family:var(--mono);font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
h1{font-size:clamp(1.8rem,4vw,2.6rem);font-weight:800;letter-spacing:-.02em;line-height:1.12;margin-bottom:16px}
.meta-row{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.86rem;margin-bottom:28px}
.excerpt{font-size:1.05rem;color:var(--muted-2);line-height:1.6;margin-bottom:26px}
.cover{width:100%;border-radius:var(--radius);border:1px solid var(--line);margin-bottom:30px;display:block}
.content{font-size:1rem;color:var(--fg);line-height:1.8;white-space:pre-wrap}
.content p{margin-bottom:1.2em}

.article-foot{margin-top:50px;padding-top:26px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px}
.article-foot a{font-size:.88rem;font-weight:600;color:var(--gold)}
.article-foot a:hover{text-decoration:underline}
</style>
</head>

<div class="wrap" id="wrap">
  <div class="state-box" id="loadingState">Načítavam článok…</div>
</div>

<script>
function getSlug(){
  const params = new URLSearchParams(location.search);
  return (params.get('slug') || '').trim();
}

function fmtDate(d){
  if(!d) return null;
  try{ return new Date(d).toLocaleDateString('sk-SK', {day:'numeric', month:'long', year:'numeric'}); }
  catch(e){ return null; }
}

function renderNotFound(){
  document.title = 'Článok nenájdený · Connect Sports Pro Magazine';
  document.getElementById('wrap').innerHTML = `
    <div class="state-box">
      <h2>Článok sa nenašiel</h2>
      <p>Buď neexistuje, alebo ešte nie je publikovaný.</p>
      <p style="margin-top:16px"><a href="/magazin/">← Späť do magazínu</a></p>
    </div>`;
}

function renderError(){
  document.getElementById('wrap').innerHTML = `
    <div class="state-box">
      <h2>Nepodarilo sa načítať článok</h2>
      <p>Skús to prosím znova o chvíľu.</p>
      <p style="margin-top:16px"><a href="/magazin/">← Späť do magazínu</a></p>
    </div>`;
}

function renderArticle(article){
  document.title = article.title + ' · Connect Sports Pro Magazine';
  const dateLabel = fmtDate(article.published_at);
  const coverHtml = article.cover_image_url
    ? `<img class="cover" src="${article.cover_image_url}" alt="${article.title}"/>`
    : '';
  const excerptHtml = article.excerpt
    ? `<p class="excerpt">${article.excerpt}</p>`
    : '';
  const contentHtml = (article.content || '')
    .split(/\n{2,}/)
    .map(p => `<p>${p}</p>`)
    .join('');

  document.getElementById('wrap').innerHTML = `
    <div class="kicker">Z magazínu</div>
    <h1>${article.title}</h1>
    <div class="meta-row">${dateLabel ? dateLabel : 'Nepublikované'}</div>
    ${excerptHtml}
    ${coverHtml}
    <div class="content">${contentHtml}</div>
    <div class="article-foot">
      <a href="/magazin/">← Ďalšie články</a>
    </div>
  `;
}

async function loadArticle(){
  const slug = getSlug();
  if(!slug){ renderNotFound(); return; }

  try{
    const { data, error } = await cspAuth.withTimeout(
      cspAuth.client.from('articles')
        .select('title, excerpt, content, cover_image_url, published_at, status')
        .eq('slug', slug)
        .eq('status', 'published')
        .maybeSingle(),
      8000, 'article lookup'
    );
    if(error){ console.error('[clanok] Could not load article:', error); renderError(); return; }
    if(!data){ renderNotFound(); return; }
    renderArticle(data);
  }catch(err){
    console.error('[clanok] loadArticle timed out:', err);
    renderError();
  }
}

loadArticle();
</script>
