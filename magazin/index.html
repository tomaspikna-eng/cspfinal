<!-- CSP Tournament Calendar — Magazine right sidebar -->
<style>
.csp-mag-tournaments{border:1px solid rgba(255,255,255,.09);border-radius:16px;background:#0d0d11;padding:15px;color:#f4f4f5;font-family:Inter,Arial,sans-serif}
.csp-mag-tournaments-head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}
.csp-mag-tournaments-title{font-weight:900;color:#d8b04b}
.csp-mag-tournaments-all{font-size:.7rem;color:#d8b04b;text-decoration:none;font-weight:900}
.csp-mag-tournaments-list{display:grid;gap:7px}
.csp-mag-tournament{display:block;padding:10px;border-radius:11px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.02);text-decoration:none;color:#f4f4f5}
.csp-mag-tournament:hover{border-color:rgba(216,176,75,.3)}
.csp-mag-tournament-date{font-size:.66rem;font-weight:900;color:#d8b04b;margin-bottom:3px}
.csp-mag-tournament-name{font-size:.8rem;font-weight:850;line-height:1.25}
.csp-mag-tournament-meta{font-size:.65rem;color:#9999a3;margin-top:4px}
</style>
<aside class="csp-mag-tournaments">
  <div class="csp-mag-tournaments-head">
    <div class="csp-mag-tournaments-title">Kalendár turnajov</div>
    <a class="csp-mag-tournaments-all" href="/kalendar-turnajov/">Všetky →</a>
  </div>
  <div class="csp-mag-tournaments-list" id="magTournamentList">Načítavam…</div>
</aside>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/csp-auth.js"></script>
<script>

function cspEsc(v){
  return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}
function cspTournamentPlace(t){
  const cfg = t.config || {};
  return {
    country: cfg.country || cfg.state || cfg.krajina || '',
    city: cfg.city || cfg.mesto || '',
  };
}
function cspTournamentHref(t){
  return `/turnament/?id=${encodeURIComponent(t.id)}`;
}
function cspFmtDate(value){
  if(!value) return '—';
  const d = new Date(value + 'T12:00:00');
  return new Intl.DateTimeFormat('sk-SK',{day:'2-digit',month:'2-digit',year:'numeric'}).format(d);
}

(async()=>{
  const box=document.getElementById('magTournamentList');
  try{
    const today=new Date().toISOString().slice(0,10);
    const {data,error}=await cspAuth.client.from('tournaments')
      .select('id,name,sport,discipline,date,venue,status,config')
      .gte('date',today).order('date',{ascending:true}).limit(5);
    if(error) throw error;
    const rows=(data||[]).filter(t=>t.status!=='archived');
    box.innerHTML=rows.length ? rows.map(t=>{
      const p=cspTournamentPlace(t);
      const place=[p.city,p.country].filter(Boolean).join(', ')||t.venue||'';
      return `<a class="csp-mag-tournament" href="${cspTournamentHref(t)}">
        <div class="csp-mag-tournament-date">${cspFmtDate(t.date)}</div>
        <div class="csp-mag-tournament-name">${cspEsc(t.name||'Turnaj')}</div>
        <div class="csp-mag-tournament-meta">${cspEsc([t.sport,t.discipline,place].filter(Boolean).join(' · '))}</div>
      </a>`;
    }).join('') : '<div style="color:#9999a3;font-size:.78rem">Žiadne nadchádzajúce turnaje.</div>';
  }catch(e){
    console.error('[mag tournament widget]',e);
    box.innerHTML='<div style="color:#9999a3;font-size:.78rem">Turnaje sa nepodarilo načítať.</div>';
  }
})();
</script>
