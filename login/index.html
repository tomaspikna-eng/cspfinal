<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Prihlásenie – Connect Sports Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#050507;--bg2:#0e0e13;--bg3:#161620;
  --line:rgba(255,255,255,.08);
  --text:#eeeef2;--muted:#55556a;--muted2:#80809a;
  --gold:#d4a843;--gold-bright:#e8b94f;
  --gold-dim:rgba(212,168,67,.09);--gold-b:rgba(212,168,67,.25);
  --red:#d94f4f;
  --font:'Syne',sans-serif;--display:'Bebas Neue',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:24px 16px;
  background:
    radial-gradient(circle at 20% 30%,rgba(212,168,67,.04),transparent 40%),
    radial-gradient(circle at 80% 70%,rgba(74,130,204,.03),transparent 40%),
    var(--bg);
}
.wrap{max-width:380px;width:100%}
.logo-line{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:36px}
.logo-dot{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--gold),#a8862e);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:1.2rem;color:#1a1000;letter-spacing:.04em}
.logo-text{font-size:1.15rem;font-weight:800;letter-spacing:-.02em}
.logo-text .gold{color:var(--gold)}

.card{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:32px 28px;display:flex;flex-direction:column;gap:18px}
.hello{text-align:center}
.hello h1{font-family:var(--display);font-size:1.9rem;color:var(--gold);letter-spacing:.05em;line-height:1.1;margin-bottom:6px}
.hello p{font-size:.82rem;color:var(--muted2)}

.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.025);color:var(--text);font-family:var(--font);font-size:.88rem;font-weight:700;cursor:pointer;transition:.15s}
.google-btn:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.18)}
.google-btn:disabled{opacity:.5;cursor:not-allowed}

.or{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.7rem;letter-spacing:.06em}
.or::before,.or::after{content:'';flex:1;height:1px;background:var(--line)}

.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2)}
.field input{background:var(--bg3);border:1px solid var(--line);border-radius:9px;color:var(--text);font-family:var(--font);font-size:.92rem;padding:11px 13px;outline:none;transition:.12s}
.field input:focus{border-color:var(--gold-b);background:rgba(212,168,67,.03)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:13px 20px;border-radius:10px;font:700 .92rem/1 var(--font);cursor:pointer;border:none;width:100%;transition:.15s}
.btn-gold{background:var(--gold);color:#1a1000}
.btn-gold:hover{background:var(--gold-bright)}
.btn:disabled{opacity:.5;cursor:not-allowed}

.msg{padding:9px 12px;border-radius:8px;font-size:.78rem;font-weight:600;display:none;text-align:center}
.msg.err{background:rgba(217,79,79,.1);border:1px solid rgba(217,79,79,.25);color:#ffd0d0;display:block;text-align:left}

.foot{text-align:center;font-size:.78rem;color:var(--muted2);margin-top:20px}
.foot a{color:var(--gold);text-decoration:none;font-weight:700}
.foot a:hover{text-decoration:underline}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/csp-auth.js"></script>
</head>
<body>
<div class="wrap">

  <div class="logo-line">
    <div class="logo-dot">C</div>
    <div class="logo-text"><span class="gold">Connect</span><span class="white">Sports</span> <span class="gold">Pro</span></div>
  </div>

  <div class="card">
    <div class="hello">
      <h1>Vitaj späť</h1>
      <p>Prihlás sa do svojho profilu</p>
    </div>

    <button class="google-btn" id="btnGoogle">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google
    </button>

    <div class="or">alebo</div>

    <div class="field"><label>E-mail</label><input id="email" type="email" placeholder="vas@email.sk" autocomplete="email"/></div>
    <div class="field"><label>Heslo</label><input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/></div>

    <div class="msg" id="msg"></div>
    <button class="btn btn-gold" id="btnLogin">Prihlásiť sa →</button>
  </div>

  <div class="foot">
    Nemáš účet? <a id="registrationLink" href="/registracia/">Vytvor si ho zadarmo</a>
  </div>

</div>

<script>
(function(){
  if(window.location.hash && window.location.hash.includes('access_token'))
    history.replaceState(null,'',window.location.pathname);
})();


function safeReturnTo(){
  const raw=new URLSearchParams(window.location.search).get('returnTo');
  if(!raw)return '/profil/';
  try{
    const decoded=decodeURIComponent(raw);
    if(decoded.startsWith('/')&&!decoded.startsWith('//'))return decoded;
  }catch(_e){}
  return '/profil/';
}
const RETURN_TO=safeReturnTo();
const registrationLink=document.getElementById('registrationLink');
if(registrationLink&&RETURN_TO!='/profil/') registrationLink.href='/registracia/?returnTo='+encodeURIComponent(RETURN_TO);

cspAuth.client.auth.onAuthStateChange(async (event, session) => {
  if((event === 'SIGNED_IN' || event === 'INITIAL_SESSION') && session){
    window.location.href = RETURN_TO;
  }
});

(async function init(){
  try {
    const { data: { session } } = await cspAuth.withTimeout(cspAuth.getSession(), 8000, 'getSession()');
    if(session) window.location.href = RETURN_TO;
  } catch(err){
    // Not fatal here: worst case the user just sees the login form even
    // though they may already have a session, which they can dismiss by
    // logging in again. Logged so it isn't a silent unhandled rejection.
    console.error('[login] initial session check failed or timed out:', err);
  }
})();

document.getElementById('btnGoogle').addEventListener('click', async () => {
  const btn = document.getElementById('btnGoogle');
  btn.disabled = true;
  const { error } = await cspAuth.signInWithGoogle(window.location.origin + RETURN_TO);
  if(error){ showMsg('Chyba: ' + cspAuth.friendlyError(error)); btn.disabled = false; }
});

document.getElementById('btnLogin').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if(!email){ showMsg('Zadaj e-mail.'); return; }
  if(!password){ showMsg('Zadaj heslo.'); return; }

  const btn = document.getElementById('btnLogin');
  btn.disabled = true; btn.textContent = 'Prihlasujem...';

  const { error } = await cspAuth.signIn(email, password);
  btn.disabled = false; btn.textContent = 'Prihlásiť sa →';

  if(error){
    showMsg(cspAuth.friendlyError(error));
  }
});

function showMsg(text){
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg err';
}
</script>
</body>
</html>
