<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Scoreboard — Connect Sports Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/csp-auth.js"></script>
<style>
:root{
  --bg:#050505;--panel:#101010;--panel2:#161616;--gold:#d4a843;--green:#18c964;
  --white:#f8f8f8;--muted:#9ca3af;--danger:#ef4444;
  --border:rgba(255,255,255,.1);--radius:20px;
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--white);font-size:15px;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--panel);color:var(--white);border-radius:12px;padding:10px 14px;font-size:14px;transition:.12s}
button:hover{border-color:var(--gold)}
button.primary{background:var(--green);border-color:var(--green);color:#031108;font-weight:700}
button.goldbtn{background:var(--gold);border-color:var(--gold);color:#050505;font-weight:700}
button.danger{background:transparent;border-color:rgba(239,68,68,.5);color:var(--danger)}
button.small{min-height:42px;padding:0 14px;font-size:15px}
input,select{font-family:inherit;background:var(--panel);border:1px solid var(--border);color:var(--white);border-radius:12px;padding:11px 12px;font-size:14px;width:100%}
.hidden{display:none !important}
a{color:var(--gold);text-decoration:none}

.app{max-width:1200px;margin:0 auto;padding:18px}
header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.brand .kicker{font-family:var(--mono);font-size:.66rem;font-weight:600;letter-spacing:.18em;color:var(--muted)}
.brand h1{font-size:1.8rem;font-weight:800;margin-top:2px}
.brand .meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.pill{padding:5px 12px;border-radius:99px;font-size:.74rem;font-weight:700;font-family:var(--mono)}
.pill.gold{background:rgba(212,168,67,.14);color:var(--gold)}
.pill.green{background:rgba(24,201,100,.14);color:var(--green)}
.actions{display:flex;gap:8px;flex-wrap:wrap}

/* SPORT SWITCHER */
.sport-tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.sport-tab{display:flex;align-items:center;gap:9px;padding:11px 18px;border-radius:14px;border:1px solid var(--border);background:var(--panel);font-weight:700;font-size:.95rem;color:var(--muted);transition:.13s}
.sport-tab .ic{font-size:1.2rem}
.sport-tab:hover{color:var(--white)}
.sport-tab.active{background:rgba(212,168,67,.12);border-color:var(--gold);color:var(--gold)}

.settings{margin-bottom:14px}
details>summary{cursor:pointer;font-weight:600;padding:12px 16px;background:var(--panel);border:1px solid var(--border);border-radius:14px;list-style:none}
summary b{color:var(--gold)}
.settings-content{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;padding:16px;background:var(--panel);border:1px solid var(--border);border-top:none;border-radius:0 0 14px 14px}
.field label{display:block;font-size:.74rem;color:var(--muted);margin-bottom:6px;font-weight:600}
.field .hint{color:var(--muted);font-size:11px}
.switch-card{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:10px 12px}
.switch-copy strong{font-size:.84rem}.switch-copy span{display:block;font-size:.7rem;color:var(--muted)}
.switch{position:relative;width:46px;height:26px;flex:0 0 46px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:#333;border-radius:99px;transition:.2s}
.slider::before{content:'';position:absolute;height:20px;width:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.switch input:checked + .slider{background:var(--green)}
.switch input:checked + .slider::before{transform:translateX(20px)}

.top{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.status{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:4px 6px;text-align:center}
.label2{font-size:.5rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:700}
.current,.period{font-size:.4rem;font-weight:800;color:var(--gold);margin-top:4px}

.players{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:16px}
.players.three{grid-template-columns:repeat(3,1fr)}
@media(max-width:680px){.players,.players.three{grid-template-columns:1fr}}

/* Centered-keypad layout — biliard "body" mode only (Snooker/Karambol/
   Pyramída), landscape tablets/monitors. Darts and universal mode are
   completely unaffected (default .stage-row is a plain block, same as
   the old markup's normal top-to-bottom stacking). Uses display:contents
   on #players so its two player cards become direct grid items of
   #stageRow -- safe against #players being fully rebuilt on every
   render(), since nothing is physically moved into/out of #keypadPanel.
   Score displays stay dominant: players get 1fr each, keypad gets a
   fixed ~25%-of-row share via minmax. Falls back to normal stacking
   below 900px so it never fights the existing <680px single-column
   fallback on narrow/portrait devices. */
.stage-row{margin-bottom:16px}
@media(min-width:901px){
  .stage-row.split-keypad{
    display:grid;
    grid-template-columns:1fr minmax(280px,25%) 1fr;
    gap:14px;align-items:start;margin-bottom:0;
  }
  .stage-row.split-keypad .players{display:contents;margin-bottom:0}
  .stage-row.split-keypad .players .player:nth-of-type(1){order:1}
  .stage-row.split-keypad .players .player:nth-of-type(2){order:3}
  .stage-row.split-keypad .keypad-panel{order:2;margin-bottom:0;max-width:none}
  .stage-row.split-keypad .keypad-grid{max-width:none}
}
.player{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:18px;transition:.15s}
.player.active{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 12px 40px rgba(212,168,67,.12)}
.player .head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.player .name{font-weight:700;font-size:1.05rem}
.player .badge{font-size:.64rem;font-weight:700;font-family:var(--mono);background:rgba(212,168,67,.16);color:var(--gold);padding:3px 8px;border-radius:7px}
.big{font-family:var(--mono);font-size:clamp(108px,26vw,208px);font-weight:700;line-height:1;text-align:center;color:var(--white)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal-overlay.hidden{display:none}
.modal-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:26px 24px;max-width:380px;width:100%;text-align:center}
.modal-title{font-size:1.3rem;font-weight:800;color:var(--gold);margin-bottom:10px}
.modal-sets{font-size:.9rem;color:var(--muted);margin-bottom:6px}
.modal-actions{display:flex;flex-direction:column;gap:10px;margin-top:18px}
.modal-btn{padding:12px;border-radius:10px;font-weight:700;font-size:.95rem;background:var(--panel2);color:var(--fg,#fff);cursor:pointer}
.modal-btn.primary{background:var(--accent,#2ecc71);color:#06230f}
.player.active .big{color:var(--gold)}
.big.finish{color:var(--green)}
.big-sub{text-align:center;color:var(--muted);font-size:12px;margin-top:-4px}
.checkout-hint{text-align:center;font-family:var(--mono);font-size:.72rem;color:var(--green);min-height:15px;margin-top:4px}
.pm{display:flex;gap:8px;justify-content:center;margin-top:12px}
.pm button{flex:1;max-width:120px;min-height:48px;font-size:18px;font-weight:700}
.pm .plus{background:rgba(24,201,100,.14);border-color:rgba(24,201,100,.4);color:var(--green)}
.pm .set-btn{background:rgba(212,168,67,.12);border-color:var(--gold);color:var(--gold);max-width:none}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(60px,1fr));gap:8px;margin-top:14px}
.stat{background:var(--panel2);border-radius:10px;padding:8px;text-align:center}
.stat span{display:block;font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.stat strong{font-size:1rem;font-family:var(--mono)}
.stat.warn strong{color:var(--danger)}

/* KEYPAD */
.keypad-panel{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:16px}
.keypad-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.run-display{font-family:var(--mono);font-size:clamp(40px,9vw,60px);font-weight:700;color:var(--gold);line-height:1;min-height:.9em}
.keypad-submit{min-height:64px;padding:0 28px;font-size:18px}
.quick-scores{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.quick{flex:1;min-width:58px;min-height:42px;font-family:var(--mono);font-weight:700;background:var(--panel2)}
.quick:hover{border-color:var(--gold);color:var(--gold)}
.quick.miss{color:var(--muted)}
.keypad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:420px}
.keypad-grid .key{min-height:60px;font-size:24px;font-weight:700;background:var(--panel2);-webkit-tap-highlight-color:transparent;touch-action:manipulation}

.timer-controls button{
  min-width:26px;min-height:22px;border-radius:6px;background:var(--panel2);
  color:var(--muted);font-weight:700;font-size:.65rem;cursor:pointer;transition:.15s;
  -webkit-tap-highlight-color:transparent;
}
.timer-controls button:hover:not(:disabled){background:var(--panel3,#2a2a2a);color:var(--fg,#fff)}
.timer-controls button:disabled{opacity:.35;cursor:default}
.timer-controls button.active{background:var(--accent,#2ecc71);color:#06230f}
.keypad-grid .key:hover{border-color:var(--gold);color:var(--gold)}
.keypad-grid .key:active{transform:scale(.96)}
.keypad-grid .key-fn{color:var(--muted);font-size:20px}
.frame-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.frame-award-btn{flex:1;min-width:150px;min-height:46px;background:rgba(212,168,67,.12);border:1px solid var(--gold);color:var(--gold);font-weight:700;font-size:14px}
.frame-award-btn:hover{background:rgba(212,168,67,.2)}

.log{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:14px 16px}
.log h2{font-size:.84rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.log-list{display:flex;flex-direction:column;gap:4px;max-height:150px;overflow-y:auto}
.log-item{font-size:.82rem;color:var(--muted);font-family:var(--mono)}

@media(max-width:480px){
  .keypad-grid{max-width:none}.keypad-head{justify-content:center;text-align:center}.keypad-submit{width:100%}
  .top{grid-template-columns:1fr}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="modal-overlay hidden" id="matchWonOverlay">
  <div class="modal-card">
    <div class="modal-title" id="matchWonTitle">🏆 Hráč vyhral zápas!</div>
    <div class="modal-sets" id="matchWonSets"></div>
    <div class="field" style="margin-top:14px">
      <label id="nextSetRaceLabel">Race to (frames) pre ďalší set</label>
      <input id="nextSetRaceTo" type="number" min="1" max="30" value="5"/>
    </div>
    <div class="modal-actions">
      <button class="modal-btn primary" id="playNextSetBtn">Hrať ďalší set</button>
      <button class="modal-btn" id="endMatchBtn">Ukončiť zápas</button>
    </div>
  </div>
</div>
<main class="app">
  <header>
    <div class="brand">
      <div class="kicker">CONNECT SPORTS PRO</div>
      <h1 id="pageTitle">Scoreboard</h1>
      <div class="meta">
        <div class="pill gold" id="disciplinePill">8-ball</div>
        <div class="pill green" id="formatPill">Race to 5</div>
      </div>
    </div>
    <div class="actions">
      <button class="primary" id="newPeriodBtn">Nový frame</button>
      <button class="danger" id="resetBtn">Reset</button>
    </div>
  </header>

  <!-- SPORT SWITCHER -->
  <div class="sport-tabs" id="sportTabs">
    <button class="sport-tab active" data-sport="billiard"><span class="ic">🎱</span> Biliard</button>
    <button class="sport-tab" data-sport="darts"><span class="ic">🎯</span> Šípky</button>
    <button class="sport-tab" data-sport="other"><span class="ic">🏓</span> Ostatné športy</button>
  </div>

  <div class="settings">
    <details>
      <summary>Nastavenie hry <b>▾</b></summary>
      <div class="settings-content">
        <div class="field" id="customLabelWrap">
          <label>Názov športu <span class="hint">(napr. Tenis, Padel, Ping pong)</span></label>
          <input id="customLabel" value="Univerzál"/>
        </div>
        <div class="field">
          <label>Disciplína</label>
          <select id="discipline"></select>
        </div>
        <div class="field">
          <label>Počet hráčov</label>
          <select id="playerCount"><option value="2">2 hráči</option><option value="3">3 hráči</option></select>
        </div>
        <div class="field">
          <label id="raceLabel">Race to</label>
          <input id="raceTo" type="number" min="1" max="30" value="5"/>
        </div>
        <div class="field hidden" id="pointsTargetWrap">
          <label>Body na frame <span class="hint">(0 = ručne)</span></label>
          <input id="pointsTarget" type="number" min="0" max="1000" value="0"/>
        </div>
        <div class="field hidden" id="setTargetWrap">
          <label>Body na set <span class="hint">(0 = ručne)</span></label>
          <input id="setTarget" type="number" min="0" max="200" value="11"/>
        </div>
        <div class="field hidden" id="doubleOutWrap">
          <label>Double out</label>
          <div class="switch-card">
            <div class="switch-copy"><strong>Finiš dvojkou</strong><span id="doubleOutText">Zapnutý</span></div>
            <label class="switch"><input type="checkbox" id="doubleOutSwitch" checked/><span class="slider"></span></label>
          </div>
        </div>
        <div class="field hidden" id="altBreakWrap">
          <label>Rozstrel</label>
          <div class="switch-card">
            <div class="switch-copy"><strong>Striedavý rozstrel</strong><span id="altBreakText">Zapnutý</span></div>
            <label class="switch"><input type="checkbox" id="altBreakSwitch" checked/><span class="slider"></span></label>
          </div>
        </div>
        <div class="field"><label>Hráč 1</label><input id="p1" value="Hráč 1"/></div>
        <div class="field"><label>Hráč 2</label><input id="p2" value="Hráč 2"/></div>
        <div class="field hidden" id="p3Wrap"><label>Hráč 3</label><input id="p3" value="Hráč 3"/></div>
        <div class="field"><label>Akcie</label><button class="goldbtn" id="applyBtn" style="width:100%">Použiť nastavenie</button></div>
      </div>
    </details>
  </div>

  <div class="top">
    <div class="status"><div class="label2">Na rade</div><div class="current" id="currentPlayer">Hráč 1</div></div>
    <div class="status"><div class="label2" id="periodLabel">Frame</div><div class="period" id="periodText">Frame 1</div></div>
    <div class="status">
      <div class="label2">Čas zápasu</div>
      <div class="period" id="matchTimer">00:00</div>
      <div class="timer-controls" style="display:flex;gap:6px;margin-top:8px;justify-content:center">
        <button id="timerStartBtn" title="Štart">▶</button>
        <button id="timerPauseBtn" title="Pauza">⏸</button>
        <button id="timerStopBtn" title="Stop (vynuluje čas)">⏹</button>
      </div>
    </div>
  </div>

  <div class="stage-row" id="stageRow">
  <div class="players" id="players"></div>

  <!-- KEYPAD (body/šípky) -->
  <div class="keypad-panel hidden" id="keypadPanel">
    <div class="keypad-head">
      <div>
        <div class="label2" id="keypadLabel">Aktuálny run — <span id="keypadPlayer">Hráč 1</span></div>
        <div class="run-display" id="runDisplay"></div>
      </div>
      <button class="goldbtn keypad-submit" id="submitRunBtn">Zapísať ✓</button>
    </div>
    <div class="quick-scores hidden" id="quickScores">
      <button class="quick" data-q="180">180</button>
      <button class="quick" data-q="140">140</button>
      <button class="quick" data-q="100">100</button>
      <button class="quick" data-q="60">60</button>
      <button class="quick" data-q="45">45</button>
      <button class="quick" data-q="26">26</button>
      <button class="quick miss" data-q="0">Mimo (0)</button>
    </div>
    <div class="keypad-grid">
      <button class="key" data-d="7">7</button><button class="key" data-d="8">8</button><button class="key" data-d="9">9</button>
      <button class="key" data-d="4">4</button><button class="key" data-d="5">5</button><button class="key" data-d="6">6</button>
      <button class="key" data-d="1">1</button><button class="key" data-d="2">2</button><button class="key" data-d="3">3</button>
      <button class="key key-fn" id="clearRunBtn">C</button><button class="key" data-d="0">0</button><button class="key key-fn" id="backRunBtn">⌫</button>
    </div>
    <div class="frame-actions" id="frameActions"></div>
  </div>
  </div>

  <div class="log"><h2>Priebeh</h2><div class="log-list" id="logList"></div></div>
</main>

<script>
/* ════════════════════ KONFIGURÁCIA ════════════════════ */
const SPORTS={
  billiard:{label:"Biliard",icon:"🎱",disciplines:["8-ball","9-ball","10-ball","14.1 continuous","Snooker","Pyramída","Karambol","Tréning"]},
  darts:{label:"Šípky",icon:"🎯",disciplines:["501","301"]},
  other:{label:"Ostatné",icon:"🏓",disciplines:["Univerzál"]},
};
const POINT_DISCIPLINES=["Snooker","Pyramída","Karambol","14.1 continuous"];
const DEFAULT_TARGET={"Snooker":0,"Pyramída":8,"Karambol":100,"14.1 continuous":100};
const START_SCORE={"501":501,"301":301};

/* ════════════════════ URL (Club Manager) ════════════════════ */
const URL_PARAMS=new URLSearchParams(location.search);
const STATION_NAME=URL_PARAMS.get("station")||"";
const STATION_SLUG=STATION_NAME?"_"+STATION_NAME.replace(/\W+/g,"_"):"";
const STORAGE_KEY="csp_scoreboard_v1"+STATION_SLUG;

/* ════════════════════ AUTH (optional, silent — never gates anything) ════════
   This page is used two ways: a logged-in individual doing personal
   training, and an anonymous tablet at a physical club station (no
   login, via ?station=...). Anonymous use must keep working exactly as
   before — no redirect, no blocking, no UI change. We only quietly note
   whether a real session exists, so a logged-in user's finished matches
   can also be saved to training_sessions (migration 0016) — see
   saveTrainingSession() below. If there's no session (or the check fails
   for any reason, e.g. no network on a club tablet), currentUserId just
   stays null and the page behaves identically to anonymous use. */
let currentUserId=null;
(async function checkSessionSilently(){
  try {
    const { data: { session } } = await cspAuth.withTimeout(cspAuth.getSession(), 8000, 'getSession()');
    currentUserId = session ? session.user.id : null;
  } catch(err){
    console.error('[scoreboard] Silent session check failed or timed out (page continues working anonymously):', err);
  }
})();

/* ════════════════════ STAV ════════════════════ */
const defaultState={
  sport:"billiard",discipline:"8-ball",customLabel:"Univerzál",
  playerCount:2,raceTo:5,pointsTarget:0,setTarget:11,doubleOut:true,alternateBreak:true,
  currentIndex:0,period:1,starter:0,runInput:"",setsWon:[0,0,0],setNumber:1,
  players:[
    {name:"Hráč 1",score:0,innings:0,runs:0,breakRuns:0,goldenBreaks:0,errors:0,framePoints:0,frames:0,highBreak:0,remaining:501,legs:0,scored:0,turns:0,high:0,last:0,points:0,sets:0},
    {name:"Hráč 2",score:0,innings:0,runs:0,breakRuns:0,goldenBreaks:0,errors:0,framePoints:0,frames:0,highBreak:0,remaining:501,legs:0,scored:0,turns:0,high:0,last:0,points:0,sets:0},
    {name:"Hráč 3",score:0,innings:0,runs:0,breakRuns:0,goldenBreaks:0,errors:0,framePoints:0,frames:0,highBreak:0,remaining:501,legs:0,scored:0,turns:0,high:0,last:0,points:0,sets:0},
  ],
  log:[],
};
let state=structuredClone(defaultState);
const $=id=>document.getElementById(id);
const activePlayers=()=>state.players.slice(0,state.playerCount);

/* ════════════════════ REŽIM ════════════════════ */
function mode(){
  if(state.sport==="darts") return "darts";       // x01 countdown + keypad
  if(state.sport==="other") return "universal";    // +/- body + sety
  return POINT_DISCIPLINES.includes(state.discipline) ? "points" : "frame"; // biliard
}
const startScore=()=>START_SCORE[state.discipline]||501;
const breakerIndex=()=>state.alternateBreak ? (state.period-1)%state.playerCount : state.starter;

/* ════════════════════ ULOŽENIE ════════════════════ */
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}}
function loadState(){
  const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return;
  try{const s=JSON.parse(raw);
    state={...structuredClone(defaultState),...s,runInput:"",
      players:defaultState.players.map((p,i)=>({...p,...(s.players?.[i]||{})})),
      log:Array.isArray(s.log)?s.log:[]};
  }catch(e){}
}
function addLog(t){state.log.push(t);}

/* ════════════════════ URL PARAMS ════════════════════ */
function applyUrlParams(){
  if([...URL_PARAMS.keys()].length===0)return;
  const sport=URL_PARAMS.get("sport"),disc=URL_PARAMS.get("discipline"),race=URL_PARAMS.get("race"),pc=URL_PARAMS.get("players");
  if(sport&&SPORTS[sport])state.sport=sport;
  if(disc&&SPORTS[state.sport].disciplines.includes(disc))state.discipline=disc;
  else state.discipline=SPORTS[state.sport].disciplines[0];
  if(race&&!isNaN(+race))state.raceTo=Math.max(1,Math.min(30,+race));
  if(pc&&(pc==="2"||pc==="3"))state.playerCount=+pc;
  const target=URL_PARAMS.get("target");
  if(target&&!isNaN(+target)){ if(mode()==="points")state.pointsTarget=+target; if(mode()==="universal")state.setTarget=+target; }
  ["p1","p2","p3"].forEach((k,i)=>{const v=URL_PARAMS.get(k);if(v)state.players[i].name=v;});
  resetScoresForMode();
  if(STATION_NAME){
    $("pageTitle").textContent=STATION_NAME;
    const from=URL_PARAMS.get("from");
    if(from){const a=document.createElement("a");a.href=decodeURIComponent(from);a.textContent="← Späť do Club Managera";a.style.cssText="display:inline-block;margin-top:6px;font-size:.78rem";$("pageTitle").parentNode.appendChild(a);}
  }
}

/* nastav počiatočné skóre podľa režimu */
function resetScoresForMode(){
  state.players.forEach(p=>{ p.remaining=startScore(); });
}

/* Rule already used by the discipline pill in render() below — pulled
   out into one shared function so saveTrainingSession() reuses the exact
   same label instead of a second, possibly-drifting copy of the rule. */
function currentDisciplineLabel(){ return state.sport==="other" ? state.customLabel : state.discipline; }

/* ════════════════════ STOPWATCH (match duration) ════════════════════════
   Manually controlled (Štart/Pauza/Stop) — does NOT auto-run. Model:
   accumulatedSeconds = time banked from previous running segments,
   runningSince = timestamp the current segment started (null = paused/
   stopped). elapsedSeconds() = accumulated + whatever's ticked since
   runningSince, so pausing/resuming never loses or double-counts time.
   resetAll() is still the only place that fully resets this to zero
   (genuinely new match) -- newPeriod()/applySettings()/per-frame resets
   deliberately don't touch it, same as before. Doesn't survive a hard
   reload -- acceptable, not a bug. */
let accumulatedSeconds=0;
let runningSince=null;
function elapsedSeconds(){
  return accumulatedSeconds + (runningSince ? Math.max(0,Math.floor((Date.now()-runningSince)/1000)) : 0);
}
function startTimer(){
  if(runningSince) return; // already running
  runningSince=Date.now();
  syncTimerButtons();
}
function pauseTimer(){
  if(!runningSince) return; // already paused
  accumulatedSeconds=elapsedSeconds();
  runningSince=null;
  syncTimerButtons();
}
function stopTimer(){
  accumulatedSeconds=0;
  runningSince=null;
  tickMatchTimer();
  syncTimerButtons();
}
function syncTimerButtons(){
  const running=!!runningSince;
  $("timerStartBtn").disabled=running;
  $("timerPauseBtn").disabled=!running;
  $("timerStartBtn").classList.toggle("active",running);
}
function formatDuration(totalSeconds){
  const h=Math.floor(totalSeconds/3600), m=Math.floor((totalSeconds%3600)/60), s=totalSeconds%60;
  const pad=n=>String(n).padStart(2,"0");
  return h>0 ? `${h}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
}
/* ════════════════════ MATCH-WON DIALOG (multi-set matches) ════════════════════
   Fires when a player reaches the winning frame/points/leg target in
   frame/points/darts modes (universal mode already has its own built-in
   multi-set structure, so it's excluded here per explicit scope). Offers
   "Ukončiť zápas" (stop here) or "Hrať ďalší set" (start a fresh set,
   with its own Race to value, tallying sets won per player). */
let pendingSetMode=null;
function showMatchWonDialog(winnerIndex,mode){
  pendingSetMode=mode;
  state.setsWon[winnerIndex]=(state.setsWon[winnerIndex]||0)+1;
  const w=activePlayers()[winnerIndex];
  $("matchWonTitle").textContent=`🏆 ${w.name} vyhral zápas!`;
  $("matchWonSets").textContent="Sety: "+activePlayers().map((p,idx)=>`${p.name} — ${state.setsWon[idx]||0}`).join(" · ");
  $("nextSetRaceLabel").textContent = mode==="darts" ? "Race to (legy) pre ďalší set" : "Race to (frames) pre ďalší set";
  $("nextSetRaceTo").value=state.raceTo;
  $("matchWonOverlay").classList.remove("hidden");
}
function endMatchDialog(){
  $("matchWonOverlay").classList.add("hidden");
}
function startNextSet(){
  const race=Number($("nextSetRaceTo").value||state.raceTo);
  state.raceTo=Math.max(1,race);
  state.setNumber++;
  state.period=1;state.runInput="";
  if(pendingSetMode==="frame"){
    activePlayers().forEach(p=>{p.score=0;p.innings=0;p.runs=0;p.breakRuns=0;p.errors=0;p.goldenBreaks=0;});
    state.currentIndex=breakerIndex();
  } else if(pendingSetMode==="points"){
    activePlayers().forEach(p=>{p.frames=0;p.framePoints=0;p.highBreak=0;p.innings=0;});
    state.currentIndex=breakerIndex();
  } else if(pendingSetMode==="darts"){
    activePlayers().forEach(p=>{p.legs=0;p.remaining=startScore();p.scored=0;p.turns=0;p.high=0;p.last=0;});
    state.starter=(state.starter+1)%state.playerCount;state.currentIndex=state.starter;
  }
  addLog(`▶ Set ${state.setNumber} — nový zápas (Race to ${state.raceTo})`);
  $("matchWonOverlay").classList.add("hidden");
  render();
}
$("playNextSetBtn").onclick=startNextSet;
$("endMatchBtn").onclick=endMatchDialog;

function tickMatchTimer(){ $("matchTimer").textContent=formatDuration(elapsedSeconds()); }
tickMatchTimer();
syncTimerButtons();
setInterval(tickMatchTimer,1000);
$("timerStartBtn").onclick=startTimer;
$("timerPauseBtn").onclick=pauseTimer;
$("timerStopBtn").onclick=stopTimer;

/* ════════════════════ TRAINING HISTORY (migration 0016) ════════════════════
   Fire-and-forget: called from each mode's match-win point below. Only
   inserts when a real session exists (see checkSessionSilently() above) —
   for anonymous/club-station use, currentUserId is null and this is a
   no-op, exactly as if it were never called. A failed save is only
   logged, never surfaced — it must never interrupt or break the live
   scoreboard itself. No loading state, no toast (a "História" viewing
   page is a separate future task — this stays invisible for now). */
async function saveTrainingSession(finalScore, winnerName, durationSeconds){
  if(!currentUserId) return;
  try {
    const { error } = await cspAuth.client.from('training_sessions').insert({
      owner_id: currentUserId,
      sport: state.sport,
      discipline: currentDisciplineLabel(),
      player_names: activePlayers().map(p=>p.name),
      final_score: finalScore,
      winner_name: winnerName,
      race_to: state.raceTo,
      duration_seconds: durationSeconds,
      status: 'completed',
      started_at: new Date(Date.now()-durationSeconds*1000).toISOString(),
      completed_at: new Date().toISOString(),
      elapsed_seconds: durationSeconds,
    });
    if(error) throw error;
    console.info('[scoreboard] Training session saved.');
  } catch(err){
    console.error('[scoreboard] Failed to save training session (live scoreboard unaffected):', err);
  }
}

/* ════════════════════ CHECKOUT (šípky) ════════════════════ */
const NOT_CHECKOUT=new Set([169,168,166,165,163,162,159]);
function canCheckout(r){return state.doubleOut?(r<=170&&r>1&&!NOT_CHECKOUT.has(r)):(r<=180&&r>0);}

/* ════════════════════ RENDER ════════════════════ */
function render(){
  const m=mode();
  // pills + labels
  $("disciplinePill").textContent = currentDisciplineLabel();
  $("currentPlayer").textContent=activePlayers()[state.currentIndex].name;

  let periodWord="Frame", fmt=`Race to ${state.raceTo}`, newBtn="Nový frame";
  if(m==="darts"){periodWord="Leg";fmt=`Race to ${state.raceTo} ${state.raceTo===1?'leg':'legy'}`;newBtn="Nový leg";}
  else if(m==="universal"){periodWord="Set";fmt=`Race to ${state.raceTo} ${state.raceTo===1?'set':'setov'}`;newBtn="Nový set";}
  else if(m==="points"){fmt = state.pointsTarget>0?`Cieľ ${state.pointsTarget} b. · Race to ${state.raceTo}`:`Race to ${state.raceTo}`;}
  $("formatPill").textContent=fmt;
  $("periodLabel").textContent=periodWord;
  $("periodText").textContent=`${periodWord} ${state.period}`;
  $("newPeriodBtn").textContent=newBtn;

  // keypad visibility
  const keypad = (m==="points"||m==="darts");
  $("keypadPanel").classList.toggle("hidden",!keypad);
  $("quickScores").classList.toggle("hidden",m!=="darts");
  // Centered-keypad layout only for biliard "points" mode (landscape
  // tablets/monitors) — darts (portrait, stacked) and universal mode
  // (no keypad at all) are untouched.
  $("stageRow").classList.toggle("split-keypad", m==="points");
  if(keypad){
    $("keypadLabel").innerHTML = (m==="darts"?"Hod (súčet 3 šípok)":"Aktuálny run")+' — <span id="keypadPlayer">'+activePlayers()[state.currentIndex].name+'</span>';
    $("runDisplay").textContent=state.runInput;
    renderFrameActions(m);
  }

  // players
  const wrap=$("players");
  wrap.className="players"+(state.playerCount===3?" three":"");
  wrap.innerHTML="";
  activePlayers().forEach((p,i)=>wrap.appendChild(playerCard(p,i,m)));
  wireCardButtons(m);

  $("logList").innerHTML=state.log.slice(-30).reverse().map(l=>`<div class="log-item">${l}</div>`).join("");
  saveState();
}

function playerCard(p,i,m){
  const card=document.createElement("article");
  card.className="player"+(i===state.currentIndex?" active":"");
  const starterBadge = (m==="darts"&&i===state.starter)||((m==="frame"||m==="points")&&i===breakerIndex()) ? `<div class="badge">${m==="darts"?"Začína":"Rozstrel"}</div>` : "";
  let bigVal,bigSub="",controls="",stats="";

  if(m==="frame"){
    bigVal=p.score;
    controls=`<div class="pm">
      <button class="plus" data-act="plus" data-i="${i}">+1</button>
      <button data-act="minus" data-i="${i}">−1</button>
    </div>`;
    stats=`<div class="stat-grid">
      <div class="stat"><span>Nábehy</span><strong>${p.innings}</strong></div>
      <div class="stat"><span>Runy</span><strong>${p.runs}</strong></div>
      <div class="stat"><span>B&amp;R</span><strong>${p.breakRuns}</strong></div>
      <div class="stat ${p.errors>=2?'warn':''}"><span>Chyby</span><strong>${p.errors}</strong></div>
    </div>`;
  } else if(m==="points"){
    bigVal=p.framePoints; bigSub="body vo frame";
    stats=`<div class="stat-grid">
      <div class="stat"><span>Frames</span><strong>${p.frames}</strong></div>
      <div class="stat"><span>Najv. séria</span><strong>${p.highBreak}</strong></div>
      <div class="stat"><span>Nábehy</span><strong>${p.innings}</strong></div>
    </div>`;
  } else if(m==="darts"){
    bigVal=p.remaining;
    const avg=p.turns?(p.scored/p.turns).toFixed(1):"0.0";
    const fin=canCheckout(p.remaining)&&p.remaining>0?"možný finiš":"";
    bigSub=`<span class="checkout-hint">${fin}</span>`;
    stats=`<div class="stat-grid">
      <div class="stat"><span>Legy</span><strong>${p.legs}</strong></div>
      <div class="stat"><span>Priemer</span><strong>${avg}</strong></div>
      <div class="stat"><span>Najviac</span><strong>${p.high}</strong></div>
    </div>`;
  } else { // universal
    bigVal=p.points;
    controls=`<div class="pm">
      <button class="plus" data-act="plus" data-i="${i}">+1</button>
      <button data-act="minus" data-i="${i}">−1</button>
    </div>
    <div class="pm"><button class="set-btn" data-act="set" data-i="${i}">🏆 Set pre ${p.name}</button></div>`;
    stats=`<div class="stat-grid">
      <div class="stat"><span>Sety</span><strong>${p.sets}</strong></div>
    </div>`;
  }

  const bigClass = (m==="darts"&&p.remaining===0)?"big finish":"big";
  card.innerHTML=`
    <div class="head"><div class="name">${p.name}</div>${starterBadge}</div>
    <div class="${bigClass}">${bigVal}</div>
    ${bigSub?`<div class="big-sub">${bigSub}</div>`:""}
    ${controls}${stats}`;
  return card;
}

function wireCardButtons(m){
  document.querySelectorAll("[data-act]").forEach(b=>{
    const i=+b.dataset.i, act=b.dataset.act;
    b.onclick=()=>{
      if(m==="frame"){ if(act==="plus")frameAdd(i); if(act==="minus")frameSub(i); }
      else if(m==="universal"){ if(act==="plus")uniAdd(i); if(act==="minus")uniSub(i); if(act==="set")uniWinSet(i); }
    };
  });
}

function renderFrameActions(m){
  const fa=$("frameActions");
  if(m==="points"){
    fa.innerHTML=activePlayers().map((p,i)=>`<button class="frame-award-btn" data-fi="${i}">🏆 Frame pre ${p.name}</button>`).join("");
    fa.querySelectorAll("[data-fi]").forEach(b=>b.onclick=()=>awardFrame(+b.dataset.fi));
  } else { fa.innerHTML=""; }
}

/* ════════════════════ FRAME engine (biliard guľové) ════════════════════ */
function frameAdd(i){
  const p=activePlayers()[i];p.score++;addLog(`${p.name} +1 frame (${p.score})`);
  if(p.score>=state.raceTo){
    addLog(`🏆 ${p.name} vyhral zápas!`);
    saveTrainingSession({mode:'frame',players:activePlayers().map(pl=>({name:pl.name,score:pl.score}))},p.name,elapsedSeconds());
    render();showMatchWonDialog(i,"frame");return;
  }
  render();
}
function frameSub(i){const p=activePlayers()[i];if(p.score>0)p.score--;render();}

/* ════════════════════ POINTS engine (snooker/pyramída/karambol) ════════════════════ */
function submitRunPoints(){
  const run=Number(state.runInput||0);
  const p=activePlayers()[state.currentIndex];
  p.framePoints+=run;p.innings++;if(run>p.highBreak)p.highBreak=run;
  addLog(`${p.name} — séria ${run} (frame ${p.framePoints})`);
  state.runInput="";
  if(state.pointsTarget>0&&p.framePoints>=state.pointsTarget){addLog(`${p.name} dosiahol cieľ ${state.pointsTarget}`);awardFrame(state.currentIndex);return;}
  state.currentIndex=(state.currentIndex+1)%state.playerCount;render();
}
function awardFrame(i){
  const w=activePlayers()[i];w.frames++;
  // Snapshotted before framePoints resets to 0 below, so a match-ending
  // frame's points are still there to save to history further down.
  const finalFramePoints=activePlayers().map(p=>p.framePoints);
  addLog(`🏆 ${w.name} vyhral frame ${state.period} (${w.framePoints} b.)`);
  state.period++;state.runInput="";activePlayers().forEach(p=>p.framePoints=0);state.currentIndex=breakerIndex();
  if(w.frames>=state.raceTo){
    addLog(`🎉 ${w.name} vyhral zápas (Race to ${state.raceTo})`);
    saveTrainingSession({mode:'points',players:activePlayers().map((p,idx)=>({name:p.name,frames:p.frames,framePoints:finalFramePoints[idx]}))},w.name,elapsedSeconds());
    render();showMatchWonDialog(i,"points");return;
  }
  render();
}

/* ════════════════════ DARTS engine (501/301) ════════════════════ */
function submitRunDarts(){
  const score=Number(state.runInput||0);
  const p=activePlayers()[state.currentIndex];
  const left=p.remaining-score;
  let bust=false;
  if(left<0)bust=true; else if(state.doubleOut&&left===1)bust=true;
  if(bust){addLog(`${p.name} — ${score} BUST (zostáva ${p.remaining})`);state.runInput="";dartsNext();return;}
  p.remaining=left;p.scored+=score;p.turns++;p.last=score;if(score>p.high)p.high=score;
  addLog(`${p.name} — ${score} (zostáva ${left})`);state.runInput="";
  if(left===0){dartsWinLeg(state.currentIndex);return;}
  dartsNext();
}
function dartsNext(){state.currentIndex=(state.currentIndex+1)%state.playerCount;render();}
function dartsWinLeg(i){
  const w=activePlayers()[i];w.legs++;addLog(`🎯 ${w.name} vyhral leg ${state.period}!`);
  if(w.legs>=state.raceTo){
    addLog(`🏆 ${w.name} vyhral zápas!`);
    saveTrainingSession({mode:'darts',players:activePlayers().map(p=>({name:p.name,legs:p.legs}))},w.name,elapsedSeconds());
    state.period++;state.starter=(state.starter+1)%state.playerCount;state.currentIndex=state.starter;state.runInput="";
    activePlayers().forEach(p=>p.remaining=startScore());render();
    showMatchWonDialog(i,"darts");return;
  }
  state.period++;state.starter=(state.starter+1)%state.playerCount;state.currentIndex=state.starter;state.runInput="";
  activePlayers().forEach(p=>p.remaining=startScore());render();
}

/* ════════════════════ UNIVERSAL engine (ostatné športy) ════════════════════ */
function uniAdd(i){
  const p=activePlayers()[i];p.points++;
  if(state.setTarget>0&&p.points>=state.setTarget){uniWinSet(i);return;}
  render();
}
function uniSub(i){const p=activePlayers()[i];if(p.points>0)p.points--;render();}
function uniWinSet(i){
  const w=activePlayers()[i];w.sets++;
  // Snapshotted before points resets to 0 below, so a match-ending set's
  // score is still there to save to history further down.
  const finalPoints=activePlayers().map(p=>p.points);
  addLog(`🏆 ${w.name} vyhral set ${state.period} (${w.points}:${activePlayers().filter((_,j)=>j!==i).map(p=>p.points).join("/")})`);
  state.period++;activePlayers().forEach(p=>p.points=0);state.starter=(state.starter+1)%state.playerCount;state.currentIndex=state.starter;
  if(w.sets>=state.raceTo){
    addLog(`🎉 ${w.name} vyhral zápas (Race to ${state.raceTo})`);
    saveTrainingSession({mode:'universal',players:activePlayers().map((p,idx)=>({name:p.name,sets:p.sets,points:finalPoints[idx]}))},w.name,elapsedSeconds());
  }
  render();
}

/* ════════════════════ KEYPAD ════════════════════ */
function keypadMax(){return mode()==="darts"?180:999;}
function pressKey(d){
  if(state.runInput.length>=3)return;
  if(state.runInput===""&&d==="0")return;
  const next=state.runInput+d;
  if(+next>keypadMax())return;
  state.runInput=next;$("runDisplay").textContent=state.runInput;
}
function clearRun(){state.runInput="";$("runDisplay").textContent="";}
function backspaceRun(){state.runInput=state.runInput.slice(0,-1);$("runDisplay").textContent=state.runInput;}
function submitRun(){ mode()==="darts"?submitRunDarts():submitRunPoints(); }
function quickScore(v){state.runInput=String(v);submitRun();}

/* ════════════════════ AKCIE ════════════════════ */
function newPeriod(){
  const m=mode();
  state.period++;
  if(m==="darts"||m==="universal"){state.starter=(state.starter+1)%state.playerCount;state.currentIndex=state.starter;}
  else state.currentIndex=breakerIndex();
  state.runInput="";
  if(m==="darts")activePlayers().forEach(p=>p.remaining=startScore());
  if(m==="points")activePlayers().forEach(p=>p.framePoints=0);
  if(m==="universal")activePlayers().forEach(p=>p.points=0);
  addLog(`Nový ${m==="darts"?"leg":m==="universal"?"set":"frame"} ${state.period}`);
  render();
}
function resetAll(){
  const keep={sport:state.sport,discipline:state.discipline,customLabel:state.customLabel,playerCount:state.playerCount,raceTo:state.raceTo,pointsTarget:state.pointsTarget,setTarget:state.setTarget,doubleOut:state.doubleOut,names:state.players.map(p=>p.name)};
  state=structuredClone(defaultState);
  Object.assign(state,{sport:keep.sport,discipline:keep.discipline,customLabel:keep.customLabel,playerCount:keep.playerCount,raceTo:keep.raceTo,pointsTarget:keep.pointsTarget,setTarget:keep.setTarget,doubleOut:keep.doubleOut});
  state.players.forEach((p,i)=>{p.name=keep.names[i];});
  resetScoresForMode();
  stopTimer(); // resetAll() is the only genuinely-new-match point; newPeriod()/applySettings() deliberately don't touch this. Manual timer -- stays stopped until Štart is pressed.
  addLog("Zápas resetovaný, nastavenia zostali");
  syncSettingsUI();render();
}

/* ════════════════════ NASTAVENIA UI ════════════════════ */
function fillDisciplines(){
  const sel=$("discipline");
  sel.innerHTML=SPORTS[state.sport].disciplines.map(d=>`<option>${d}</option>`).join("");
  sel.value=state.discipline;
}
function applySettings(){
  state.sport=document.querySelector(".sport-tab.active").dataset.sport;
  state.discipline=$("discipline").value;
  state.customLabel=$("customLabel").value.trim()||"Univerzál";
  state.playerCount=Number($("playerCount").value);
  state.raceTo=Math.max(1,Number($("raceTo").value||5));
  state.pointsTarget=Math.max(0,Number($("pointsTarget").value||0));
  state.setTarget=Math.max(0,Number($("setTarget").value||0));
  state.doubleOut=$("doubleOutSwitch").checked;
  state.alternateBreak=$("altBreakSwitch").checked;
  state.players[0].name=$("p1").value.trim()||"Hráč 1";
  state.players[1].name=$("p2").value.trim()||"Hráč 2";
  state.players[2].name=$("p3").value.trim()||"Hráč 3";
  state.currentIndex=0;state.starter=0;state.runInput="";
  resetScoresForMode();
  addLog("Nastavenie uložené");
  syncSettingsUI();render();
}
function syncSettingsUI(){
  // sport tabs
  document.querySelectorAll(".sport-tab").forEach(t=>t.classList.toggle("active",t.dataset.sport===state.sport));
  fillDisciplines();
  $("playerCount").value=String(state.playerCount);
  $("raceTo").value=state.raceTo;
  $("pointsTarget").value=state.pointsTarget;
  $("setTarget").value=state.setTarget;
  $("customLabel").value=state.customLabel;
  $("doubleOutSwitch").checked=state.doubleOut;
  $("doubleOutText").textContent=state.doubleOut?"Zapnutý":"Vypnutý";
  $("altBreakSwitch").checked=state.alternateBreak;
  $("altBreakText").textContent=state.alternateBreak?"Zapnutý":"Vypnutý";
  $("p1").value=state.players[0].name;$("p2").value=state.players[1].name;$("p3").value=state.players[2].name;
  $("p3Wrap").classList.toggle("hidden",state.playerCount!==3);
  // podmienené polia podľa športu/režimu
  const m=mode();
  $("customLabelWrap").classList.toggle("hidden",state.sport!=="other");
  $("pointsTargetWrap").classList.toggle("hidden",m!=="points");
  $("setTargetWrap").classList.toggle("hidden",m!=="universal");
  $("doubleOutWrap").classList.toggle("hidden",m!=="darts");
  $("altBreakWrap").classList.toggle("hidden",m!=="frame"&&m!=="points");
  $("raceLabel").textContent = m==="darts"?"Race to (legy)" : m==="universal"?"Race to (sety)" : "Race to (frames)";
}

/* ════════════════════ WIRING ════════════════════ */
$("sportTabs").querySelectorAll(".sport-tab").forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll(".sport-tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    state.sport=tab.dataset.sport;
    state.discipline=SPORTS[state.sport].disciplines[0];
    // default ciele
    if(mode()==="points")state.pointsTarget=DEFAULT_TARGET[state.discipline]??0;
    state.period=1;state.currentIndex=0;state.starter=0;state.runInput="";
    resetScoresForMode();
    syncSettingsUI();render();
  };
});
$("discipline").onchange=()=>{
  state.discipline=$("discipline").value;
  if(mode()==="points"){state.pointsTarget=DEFAULT_TARGET[state.discipline]??0;}
  resetScoresForMode();
  syncSettingsUI();render();
};
$("playerCount").onchange=()=>$("p3Wrap").classList.toggle("hidden",$("playerCount").value!=="3");
$("doubleOutSwitch").onchange=()=>{state.doubleOut=$("doubleOutSwitch").checked;$("doubleOutText").textContent=state.doubleOut?"Zapnutý":"Vypnutý";};
$("altBreakSwitch").onchange=()=>{state.alternateBreak=$("altBreakSwitch").checked;$("altBreakText").textContent=state.alternateBreak?"Zapnutý":"Vypnutý";};
$("applyBtn").onclick=applySettings;
$("newPeriodBtn").onclick=newPeriod;
$("resetBtn").onclick=resetAll;
$("submitRunBtn").onclick=submitRun;
$("clearRunBtn").onclick=clearRun;
$("backRunBtn").onclick=backspaceRun;
document.querySelectorAll(".keypad-grid .key[data-d]").forEach(k=>k.onclick=()=>pressKey(k.dataset.d));
document.querySelectorAll(".quick[data-q]").forEach(q=>q.onclick=()=>quickScore(+q.dataset.q));
document.addEventListener("keydown",e=>{
  if(!["points","darts"].includes(mode()))return;
  if(e.key>="0"&&e.key<="9")pressKey(e.key);
  else if(e.key==="Enter")submitRun();
  else if(e.key==="Backspace"){e.preventDefault();backspaceRun();}
  else if(e.key==="Escape")clearRun();
});

/* ════════════════════ INIT ════════════════════ */
loadState();
applyUrlParams();
syncSettingsUI();
render();
if(!state.log.length){addLog("Scoreboard pripravený");render();}

/* ── Lock mód pre tablety (?lock=1) — skryje prepínač športu + nastavenia ── */
if(URL_PARAMS.get("lock")==="1"){
  $("sportTabs").classList.add("hidden");
  document.querySelector(".settings").classList.add("hidden");
}
</script>
</body>
</html>
