<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Connect Sports Pro – Upgrade</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#060608;--bg2:#0d0d11;--bg3:#131318;
  --line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.04);
  --text:#f4f4f8;--muted:#55556a;--muted2:#80809a;
  --gold:#d4a843;--gold-bright:#e8b94f;
  --gold-dim:rgba(212,168,67,.09);--gold-b:rgba(212,168,67,.25);
  --green:#1ec86a;--green-dim:rgba(30,200,106,.08);--green-b:rgba(30,200,106,.22);
  --blue:#4a82cc;--blue-dim:rgba(74,130,204,.08);--blue-b:rgba(74,130,204,.22);
  --purple:#a843d4;--purple-dim:rgba(168,67,212,.09);--purple-b:rgba(168,67,212,.22);
  --font:'Syne',sans-serif;--display:'Bebas Neue',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(212,168,67,.10),transparent 55%),var(--bg);
  padding:32px 20px 80px;}
.page{max-width:900px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px}
.brand{font-size:1.15rem;font-weight:800;letter-spacing:-.03em}
.brand .gold{color:var(--gold)}
.back{display:inline-flex;align-items:center;gap:6px;font-size:.85rem;font-weight:700;color:var(--muted2);text-decoration:none;padding:8px 14px;border-radius:9px;border:1px solid var(--line);background:rgba(255,255,255,.02)}
.back:hover{color:var(--text)}
.hero{text-align:center;margin-bottom:36px}
.hero-title{font-family:var(--display);font-size:clamp(2.2rem,5vw,3.5rem);letter-spacing:.04em;line-height:1.05;margin-bottom:14px}
.hero-title .gold{color:var(--gold)}
.hero-sub{font-size:1.05rem;color:var(--muted2);max-width:540px;margin:0 auto;line-height:1.6}
.ctx-badge{display:inline-block;margin-top:14px;padding:8px 18px;border-radius:999px;background:var(--gold-dim);border:1px solid var(--gold-b);color:var(--gold);font-weight:700;font-size:.85rem;letter-spacing:.03em}

.pricing{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:40px;max-width:680px;margin-left:auto;margin-right:auto}
@media(max-width:680px){.pricing{grid-template-columns:1fr;max-width:420px}}
.plan{background:var(--bg2);border:1px solid var(--line);border-radius:20px;padding:32px 28px;display:flex;flex-direction:column;position:relative;transition:.2s}
.plan:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.18)}
.plan.featured{border-color:var(--gold-b);background:linear-gradient(160deg,var(--bg2),rgba(212,168,67,.05));box-shadow:0 12px 40px rgba(0,0,0,.4),0 0 60px rgba(212,168,67,.08)}
.plan.current{border-color:var(--green-b);background:linear-gradient(160deg,var(--bg2),rgba(30,200,106,.04))}
.featured-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--gold);color:#1a1000;padding:5px 14px;border-radius:999px;font-size:.7rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase}
.current-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--green);color:#06230f;padding:5px 14px;border-radius:999px;font-size:.7rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase}
.plan-icon{font-size:2.4rem;margin-bottom:8px}
.plan-name{font-family:var(--display);font-size:1.8rem;letter-spacing:.06em;color:var(--gold);margin-bottom:6px}
.plan-target{font-size:.82rem;color:var(--muted2);margin-bottom:22px;line-height:1.5;min-height:38px}
.plan-price{display:flex;align-items:baseline;gap:5px;margin-bottom:24px}
.plan-price .amount{font-family:var(--display);font-size:3rem;letter-spacing:.02em;line-height:1}
.plan-price .currency{font-family:var(--display);font-size:1.6rem;color:var(--muted2);margin-left:-3px}
.plan-price .period{font-size:.85rem;color:var(--muted2);margin-left:6px;font-weight:600}
.plan-price.free .amount{color:var(--muted2)}
.plan-features{list-style:none;flex:1;margin-bottom:24px}
.plan-features li{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--line2);font-size:.92rem;color:var(--text)}
.plan-features li:last-child{border-bottom:none}
.plan-features li.disabled{color:var(--muted);text-decoration:line-through}
.check{flex:0 0 18px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;margin-top:1px}
.check.yes{background:var(--green-dim);border:1px solid var(--green-b);color:var(--green)}
.check.no{background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--muted)}
.check.star{background:var(--gold-dim);border:1px solid var(--gold-b);color:var(--gold)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:14px 20px;border-radius:11px;font:700 .92rem/1 var(--font);cursor:pointer;border:none;text-decoration:none;transition:.15s;width:100%}
.btn-gold{background:var(--gold);color:#1a1000}.btn-gold:hover{background:var(--gold-bright)}
.btn-green{background:var(--green);color:#06230f}
.btn-disabled{background:rgba(255,255,255,.03);color:var(--muted);cursor:not-allowed;border:1px solid var(--line2)}

.info-box{max-width:680px;margin:0 auto;padding:22px 26px;background:rgba(74,130,204,.05);border:1px solid var(--blue-b);border-radius:14px;display:flex;gap:14px;align-items:flex-start}
.info-box .icon{font-size:1.4rem;flex:0 0 auto}
.info-box-text{font-size:.88rem;color:var(--text);line-height:1.6}
.info-box-text strong{color:#c5d9f5}

.loading-screen{padding:60px;text-align:center;color:var(--muted2)}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/csp-auth.js"></script>
</head>
<body>
<div class="page">

  <div class="topbar">
    <div class="brand"><span class="gold">Connect</span><span class="white">Sports</span> <span class="gold">Pro</span></div>
    <a href="/profil/" class="back">← Späť na profil</a>
  </div>

  <div class="hero">
    <h1 class="hero-title">Vyber si <span class="gold">plán</span></h1>
    <p class="hero-sub">Začni zdarma. Upgradni keď budeš chcieť odomknúť všetky nástroje.</p>
    <div id="ctxBadge"></div>
  </div>

  <div id="pricingContainer">
    <div class="loading-screen">Načítavam...</div>
  </div>

  <div class="info-box">
    <div class="icon">ℹ️</div>
    <div class="info-box-text">
      <strong>Testovacia beta fáza</strong><br>
      Platby ešte nie sú aktívne. Ak chceš upgrade počas bety, kontaktuj <strong>kontakt@connectsportspro.com</strong> — admin ti odomkne plán manuálne.
    </div>
  </div>

</div>

<script>
// Reads real data from csp-staging (profiles.plan / profiles.role) via
// the shared cspAuth.client, rather than the old, unused
// gilzomwhuwcxpkegtlhj project's nonexistent `subscriptions` and
// `organizations` tables. This page has always been read-only (no writes
// existed before this change either) -- plan changes stay admin/manual
// for now, per the existing "beta phase" contact-admin flow below
// (contactAdmin()), which is intentionally left as-is.
//
// The old code's "active context" concept (user vs club vs organization,
// previously sourced from a `csp_active_context_v1` localStorage key
// that nothing in this repo ever actually writes, defaulting to 'user'
// every time, plus a nonexistent `organizations` table) maps directly
// onto the real profiles.role column (player/club/organization) already
// built for exactly this purpose -- no new logic invented, just reading
// the real equivalent of what this page was already trying to express.
(async function init(){
  try {
    const { data: { session } } = await cspAuth.withTimeout(cspAuth.getSession(), 8000, 'getSession()');
    if(!session){
      window.location.href = '/login/';
      return;
    }

    const { data: profile, error } = await cspAuth.withTimeout(cspAuth.getCurrentProfile(session.user), 8000, 'getCurrentProfile()');
    if(error){
      console.error('[upgrade] Could not load profile, falling back to free/player defaults:', error);
    }

    const currentPlan = (profile && profile.plan) || 'free';
    const role = (profile && profile.role) || 'player';
    const ctxName = (profile && profile.full_name) || session.user.email;
    const icons = { player: '👤', club: '🏛️', organization: '🏆' };

    document.getElementById('ctxBadge').innerHTML =
      '<div class="ctx-badge">Aktívny profil: ' + (icons[role] || '👤') + ' ' + ctxName + '</div>';

    if(role === 'club'){
      renderClubPlans(currentPlan);
    } else if(role === 'organization'){
      renderOrgPlans(currentPlan);
    } else {
      renderUserPlans(currentPlan);
    }
  } catch(err){
    console.error('[upgrade] Failed to load plan info:', err);
    document.getElementById('pricingContainer').innerHTML = '<div class="loading-screen">Nepodarilo sa načítať údaje o pláne. Skús obnoviť stránku.</div>';
  }
})();

function renderUserPlans(currentPlan){
  document.getElementById('pricingContainer').innerHTML = `
    <div class="pricing">
      <div class="plan ${currentPlan === 'free' ? 'current' : ''}">
        ${currentPlan === 'free' ? '<div class="current-badge">Aktívny</div>' : ''}
        <div class="plan-icon">👤</div>
        <div class="plan-name">Free</div>
        <div class="plan-target">Pre fanúšikov a hráčov ktorí chcú sledovať dianie.</div>
        <div class="plan-price free">
          <span class="amount">0</span><span class="currency">€</span>
          <span class="period">/ navždy</span>
        </div>
        <ul class="plan-features">
          <li><span class="check yes">✓</span><span>Verejný profil</span></li>
          <li><span class="check yes">✓</span><span>Prehliadanie turnajov</span></li>
          <li><span class="check yes">✓</span><span>Registrácia na turnaje</span></li>
          <li class="disabled"><span class="check no">✕</span><span>Tréning</span></li>
          <li class="disabled"><span class="check no">✕</span><span>Vytváranie turnajov</span></li>
          <li class="disabled"><span class="check no">✕</span><span>Vlastné udalosti</span></li>
        </ul>
        ${currentPlan === 'free' ? '<button class="btn btn-disabled" disabled>Aktuálny plán</button>' : '<button class="btn btn-disabled" disabled>Free</button>'}
      </div>

      <div class="plan featured">
        <div class="featured-badge">Pre hráčov</div>
        <div class="plan-icon">🎱</div>
        <div class="plan-name">Pro</div>
        <div class="plan-target">Pre aktívnych hráčov ktorí trénujú a organizujú vlastné turnaje.</div>
        <div class="plan-price">
          <span class="amount">7,90</span><span class="currency">€</span>
          <span class="period">/ mesiac</span>
        </div>
        <ul class="plan-features">
          <li><span class="check yes">✓</span><span>Všetko z Free</span></li>
          <li><span class="check star">★</span><span><strong>Spustenie tréningu</strong></span></li>
          <li><span class="check star">★</span><span><strong>Vlastné turnaje</strong></span></li>
          <li><span class="check star">★</span><span><strong>Tvorba udalostí</strong></span></li>
          <li><span class="check yes">✓</span><span>Pokročilé štatistiky</span></li>
          <li><span class="check yes">✓</span><span>História zápasov</span></li>
        </ul>
        ${currentPlan === 'pro'
          ? '<button class="btn btn-green" disabled>✓ Aktívny plán</button>'
          : '<button class="btn btn-gold" onclick="contactAdmin(\'Pro 7,90€ pre osobný profil\')">Upgradnúť na Pro →</button>'}
      </div>
    </div>
  `;
}

function renderClubPlans(currentPlan){
  document.getElementById('pricingContainer').innerHTML = `
    <div class="pricing">
      <div class="plan ${currentPlan === 'free' ? 'current' : ''}">
        ${currentPlan === 'free' ? '<div class="current-badge">Aktívny</div>' : ''}
        <div class="plan-icon">🏛️</div>
        <div class="plan-name">Free</div>
        <div class="plan-target">Verejný profil klubu a základné vlastnosti.</div>
        <div class="plan-price free">
          <span class="amount">0</span><span class="currency">€</span>
          <span class="period">/ navždy</span>
        </div>
        <ul class="plan-features">
          <li><span class="check yes">✓</span><span>Verejný profil klubu</span></li>
          <li><span class="check yes">✓</span><span>Zoznam členov</span></li>
          <li class="disabled"><span class="check no">✕</span><span>Tréning</span></li>
          <li class="disabled"><span class="check no">✕</span><span>Vytváranie turnajov</span></li>
          <li class="disabled"><span class="check no">✕</span><span>Udalosti</span></li>
          <li class="disabled"><span class="check no">✕</span><span>Rezervácie</span></li>
          <li class="disabled"><span class="check no">✕</span><span>Správa športovísk</span></li>
        </ul>
        <button class="btn btn-disabled" disabled>${currentPlan === 'free' ? 'Aktuálny plán' : 'Free'}</button>
      </div>

      <div class="plan featured">
        <div class="featured-badge">Pre kluby</div>
        <div class="plan-icon">⭐</div>
        <div class="plan-name">Ultra</div>
        <div class="plan-target">Plnohodnotný klubový systém s rezerváciami a správou športovísk.</div>
        <div class="plan-price">
          <span class="amount">14,90</span><span class="currency">€</span>
          <span class="period">/ mesiac</span>
        </div>
        <ul class="plan-features">
          <li><span class="check yes">✓</span><span>Všetko z Free</span></li>
          <li><span class="check star">★</span><span><strong>Tréning</strong> pre členov klubu</span></li>
          <li><span class="check star">★</span><span><strong>Klubové turnaje</strong> + bracket</span></li>
          <li><span class="check star">★</span><span><strong>Rebríčky</strong> hráčov</span></li>
          <li><span class="check star">★</span><span><strong>Udalosti</strong> v kalendári</span></li>
          <li><span class="check star">★</span><span><strong>Rezervácie</strong> (plugin)</span></li>
          <li><span class="check star">★</span><span><strong>Správa športovísk</strong> (plugin)</span></li>
        </ul>
        ${currentPlan === 'ultra'
          ? '<button class="btn btn-green" disabled>✓ Aktívny plán</button>'
          : '<button class="btn btn-gold" onclick="contactAdmin(\'Ultra 14,90€ pre klub\')">Upgradnúť na Ultra →</button>'}
      </div>
    </div>
  `;
}

function renderOrgPlans(currentPlan){
  document.getElementById('pricingContainer').innerHTML = `
    <div class="pricing">
      <div class="plan ${currentPlan === 'free' ? 'current' : ''}">
        ${currentPlan === 'free' ? '<div class="current-badge">Aktívny</div>' : ''}
        <div class="plan-icon">🏆</div>
        <div class="plan-name">Free</div>
        <div class="plan-target">Verejný profil organizácie a základné vlastnosti.</div>
        <div class="plan-price free">
          <span class="amount">0</span><span class="currency">€</span>
          <span class="period">/ navždy</span>
        </div>
        <ul class="plan-features">
          <li><span class="check yes">✓</span><span>Verejný profil zväzu</span></li>
          <li><span class="check yes">✓</span><span>Zoznam pridružených klubov</span></li>
          <li class="disabled"><span class="check no">✕</span><span>Multi-klubové turnaje</span></li>
          <li class="disabled"><span class="check no">✕</span><span>Rebríčky a ligy</span></li>
          <li class="disabled"><span class="check no">✕</span><span>Tvorba udalostí</span></li>
        </ul>
        <button class="btn btn-disabled" disabled>${currentPlan === 'free' ? 'Aktuálny plán' : 'Free'}</button>
      </div>

      <div class="plan featured">
        <div class="featured-badge">Pre organizácie</div>
        <div class="plan-icon">⭐</div>
        <div class="plan-name">Ultra</div>
        <div class="plan-target">Multi-klubová správa, ligy, rebríčky a aktuality.</div>
        <div class="plan-price">
          <span class="amount">14,90</span><span class="currency">€</span>
          <span class="period">/ mesiac</span>
        </div>
        <ul class="plan-features">
          <li><span class="check yes">✓</span><span>Všetko z Free</span></li>
          <li><span class="check star">★</span><span><strong>Multi-klubové turnaje</strong></span></li>
          <li><span class="check star">★</span><span><strong>Národné/regionálne rebríčky</strong></span></li>
          <li><span class="check star">★</span><span><strong>Ligy</strong> a sezónne výsledky</span></li>
          <li><span class="check star">★</span><span><strong>Udalosti</strong> + aktuality</span></li>
          <li><span class="check yes">✓</span><span>Pokročilá analytika</span></li>
        </ul>
        ${currentPlan === 'ultra'
          ? '<button class="btn btn-green" disabled>✓ Aktívny plán</button>'
          : '<button class="btn btn-gold" onclick="contactAdmin(\'Ultra 14,90€ pre organizáciu\')">Upgradnúť na Ultra →</button>'}
      </div>
    </div>
  `;
}

function contactAdmin(label){
  alert('Platobná brána bude spustená čoskoro.\n\nV beta fáze napíš na kontakt@connectsportspro.com s touto požiadavkou:\n\n' + label + '\n\nAdmin ti plán odomkne ručne.');
}
</script>
</body>
</html>
