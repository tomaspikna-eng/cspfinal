<style>
:root{
  --bg:#060608; --bg2:#0d0d11; --bg3:#14141a; --bg4:#1a1a22;
  --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.04);
  --text:#f4f4f8; --text-soft:#a8a8b8; --muted:#6a6a7a; --muted2:#80809a;
  --gold:#d4a843; --gold-bright:#e8b94f; --gold-dim:rgba(212,168,67,.10); --gold-b:rgba(212,168,67,.25);
  --green:#1ec86a; --green-dim:rgba(30,200,106,.10);
  --red:#d94f4f;
  --font:'Syne',sans-serif; --display:'Bebas Neue',sans-serif; --mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
input,textarea,select{font-family:inherit;font-size:.92rem;color:var(--text);background:var(--bg3);border:1px solid var(--line);border-radius:9px;padding:11px 13px;width:100%}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--gold-b)}
textarea{resize:vertical;min-height:90px}
label{display:block;font-size:.78rem;color:var(--text-soft);font-weight:600;margin-bottom:6px}

.topbar{position:sticky;top:0;z-index:20;background:rgba(6,6,8,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.topbar-in{max-width:720px;margin:0 auto;padding:0 20px;min-height:60px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:8px;display:block;object-fit:cover}
.brand-word{font-family:var(--display);font-size:1.15rem;letter-spacing:.02em}
.brand-word .g{color:var(--gold)} .brand-word .w{color:var(--text)}
.tb-right{display:flex;align-items:center;gap:14px}
.tb-user{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--text-soft)}
.tb-av{width:26px;height:26px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;color:var(--gold)}
.link-btn{font-size:.82rem;color:var(--gold);font-weight:600}
.link-btn:hover{text-decoration:underline}

.wrap{max-width:640px;margin:0 auto;padding:40px 20px 80px}
.page-head{margin-bottom:28px}
.page-head h1{font-family:var(--display);font-size:2.2rem;letter-spacing:.01em;line-height:1.05}
.page-head p{color:var(--text-soft);font-size:.92rem;margin-top:8px;max-width:460px}

.field{margin-bottom:18px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:520px){.field-row{grid-template-columns:1fr}}
.hint{font-size:.72rem;color:var(--muted);margin-top:5px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:.9rem;padding:13px 20px;border-radius:10px;border:1px solid var(--line);transition:.14s;width:100%}
.btn-primary{background:var(--gold);color:#1a1000;border-color:var(--gold)}
.btn-primary:hover{background:var(--gold-bright)}
.btn-primary:disabled{opacity:.55;cursor:not-allowed}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--green);color:#06230f;font-weight:700;font-size:.85rem;padding:11px 20px;border-radius:99px;opacity:0;pointer-events:none;transition:.2s}
.toast.show{opacity:1}
.toast.err{background:var(--red);color:#fff}

.loading-gate{max-width:640px;margin:0 auto;padding:60px 20px;color:var(--muted2);font-size:.9rem}


.section-label{
  font-family:var(--mono);font-size:.7rem;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:var(--gold);margin:26px 0 12px;
}
.section-label:first-child{margin-top:0}

.share-box{margin-top:32px;padding-top:24px;border-top:1px solid var(--line)}
.share-row{display:flex;flex-wrap:wrap;gap:8px}
.share-btn{padding:10px 16px;border-radius:9px;border:1px solid var(--line);font-size:.82rem;font-weight:700;background:var(--bg2);color:var(--text-soft);transition:.14s}
.share-btn:hover{border-color:var(--gold-b);color:var(--gold)}
.share-btn.fb:hover{border-color:#4267B2;color:#4267B2}
.share-btn.wa:hover{border-color:#25D366;color:#25D366}
.share-btn.x:hover{border-color:#fff;color:#fff}
.share-btn.ig:hover{border-color:#E1306C;color:#E1306C}
</style>
</head>

<div class="loading-gate" id="loadingGate">Načítavam…</div>

<div class="wrap" id="formWrap" style="display:none">
  <div class="page-head">
    <h1>Nová udalosť</h1>
  </div>


  <form id="eventForm" onsubmit="return false">
    <div class="section-label">Čo</div>
    <div class="field">
      <label for="evTitle">Názov udalosti</label>
      <input id="evTitle" type="text" placeholder="napr. Jarné stretnutie klubu ŠK Pohoda" required/>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="evSport">Šport (nepovinné)</label>
        <select id="evSport" onchange="onSportChange()">
          <option value="">— nešpecifikované —</option>
        </select>
      </div>
      <div class="field">
        <label for="evDiscipline">Disciplína</label>
        <select id="evDiscipline" disabled>
          <option value="">— vyber najprv šport —</option>
        </select>
      </div>
    </div>

    <div class="section-label">Kde</div>
    <div class="field">
      <label for="evLocation">Miesto</label>
      <input id="evLocation" type="text" placeholder="napr. Klub Pohoda, Žilina"/>
    </div>

    <div class="section-label">Kedy</div>
    <div class="field-row">
      <div class="field">
        <label for="evStart">Začiatok</label>
        <input id="evStart" type="datetime-local" required/>
      </div>
      <div class="field">
        <label for="evEnd">Koniec (nepovinné)</label>
        <input id="evEnd" type="datetime-local"/>
        <div class="hint">Nechaj prázdne, ak udalosť nemá presný koniec.</div>
      </div>
    </div>

    <div class="section-label">Poznámka</div>
    <div class="field">
      <label for="evDescription">Poznámka pre účastníkov</label>
      <textarea id="evDescription" placeholder="Pre koho je to určené, čo si priniesť, ďalšie detaily..."></textarea>
    </div>

    <button class="btn btn-primary" id="saveBtn" onclick="saveEvent()">Vytvoriť udalosť</button>
  </form>

  <div class="share-box" id="shareBox" style="display:none">
    <div class="section-label">Zdieľať</div>
    <p class="hint" style="margin-bottom:12px">Udalosť je uložená. Zdieľaj ju ďalej:</p>
    <div class="share-row">
      <button class="share-btn fb" onclick="shareTo('facebook')">Facebook</button>
      <button class="share-btn wa" onclick="shareTo('whatsapp')">WhatsApp</button>
      <button class="share-btn x" onclick="shareTo('x')">X</button>
      <button class="share-btn ig" onclick="shareTo('instagram')">Instagram</button>
      <button class="share-btn copy" onclick="shareTo('copy')">Kopírovať odkaz</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentSession = null;

/* Same sport/discipline catalogue as Tournament Manager, reused as-is for
   consistency across the app — not a separate list for events. */
const SPORTS=['Biliard','Šípky','Bowling','Tenis','Stolný tenis','Padel','Šach','Bedminton','Karty'];
const DISCIPLINES={
  'Biliard':['8-ball','9-ball','10-ball','Snooker','Karambol','Pyramída','14.1 nekonečná'],
  'Šípky':['501','301','Cricket'],
  'Bowling':['Klasik'],
  'Tenis':['Dvojhra','Štvorhra'],
  'Stolný tenis':['Dvojhra','Štvorhra'],
  'Padel':['Štvorhra'],
  'Šach':['Klasik','Rapid','Blitz'],
  'Bedminton':['Dvojhra','Štvorhra'],
  'Karty':['Mariáš','Žolíky','Rummy','Bridge','Kanasta'],
};

function populateSportSelect(){
  const sel=document.getElementById('evSport');
  SPORTS.forEach(sp=>{
    const opt=document.createElement('option');
    opt.value=sp; opt.textContent=sp;
    sel.appendChild(opt);
  });
}

function onSportChange(){
  const sport=document.getElementById('evSport').value;
  const discSel=document.getElementById('evDiscipline');
  discSel.innerHTML='';
  if(!sport){
    discSel.disabled=true;
    discSel.innerHTML='<option value="">— vyber najprv šport —</option>';
    return;
  }
  discSel.disabled=false;
  (DISCIPLINES[sport]||[]).forEach(d=>{
    const opt=document.createElement('option');
    opt.value=d; opt.textContent=d;
    discSel.appendChild(opt);
  });
}

(async function initPage(){
  try{
    const { data: { session } } = await cspAuth.withTimeout(cspAuth.getSession(), 8000, 'getSession()');
    if(!session){ location.href = '/login/'; return; }
    currentSession = session;
    const { data: profile } = await cspAuth.withTimeout(cspAuth.getCurrentProfile(session.user), 8000, 'getCurrentProfile()');
    const displayName = (profile && profile.full_name) || session.user.email;
    document.getElementById('tbName').textContent = displayName;
    document.getElementById('tbAv').textContent = (displayName.trim().split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase()) || '??';
  }catch(err){
    console.error('[udalost] Auth check failed or timed out:', err);
    location.href = '/login/';
    return;
  }
  document.getElementById('loadingGate').style.display = 'none';
  document.getElementById('formWrap').style.display = '';
  populateSportSelect();
})();

function toast(msg, err){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err ? ' err' : '');
  setTimeout(()=>{ t.className = 'toast' + (err ? ' err' : ''); }, 2400);
}

/* Inserts into the real `events` table (migration 0018). Published
   immediately — same as how tournaments and clubs work in this repo,
   no draft/review step. */
async function saveEvent(){
  const title = document.getElementById('evTitle').value.trim();
  const startsAt = document.getElementById('evStart').value;
  if(!title){ toast('Zadaj názov udalosti.', true); return; }
  if(!startsAt){ toast('Zadaj začiatok udalosti.', true); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Ukladám…';

  const payload = {
    owner_id: currentSession.user.id,
    title: title,
    description: document.getElementById('evDescription').value.trim() || null,
    sport: document.getElementById('evSport').value || null,
    discipline: document.getElementById('evDiscipline').value || null,
    location_text: document.getElementById('evLocation').value.trim() || null,
    starts_at: new Date(startsAt).toISOString(),
    ends_at: document.getElementById('evEnd').value ? new Date(document.getElementById('evEnd').value).toISOString() : null,
    status: 'published',
  };

  try{
    const { data: inserted, error } = await cspAuth.withTimeout(
      cspAuth.client.from('events').insert(payload).select().single(),
      8000, 'insert event'
    );
    if(error) throw error;

    lastSavedEvent = inserted;
    toast('Udalosť vytvorená ✓');
    document.getElementById('shareBox').style.display = '';
    document.getElementById('shareBox').scrollIntoView({behavior:'smooth', block:'start'});
  }catch(err){
    console.error('[udalost] Failed to save event:', err);
    toast('Nepodarilo sa uložiť udalosť. Skús to znova.', true);
  }finally{
    btn.disabled = false;
    btn.textContent = 'Vytvoriť udalosť';
  }
}

/* Share text uses the real events row returned from the DB insert.
   The shared URL points to /udalosti/ (the public events listing page).
   A per-event deep-link anchor (e.g. /udalosti/#ev-{id}) would require
   either server-side routing or a JS hash-router on the listing page.
   Since /udalosti/ is a client-rendered static page without either,
   using the listing URL directly is the practical choice — the user can
   find their event at the top of the "Nadchádzajúce" section. */
let lastSavedEvent = null;

function buildShareText(){
  if(!lastSavedEvent) return '';
  const when = new Date(lastSavedEvent.starts_at).toLocaleString('sk-SK', {dateStyle:'medium', timeStyle:'short'});
  const whereLine = lastSavedEvent.location_text ? ` · ${lastSavedEvent.location_text}` : '';
  return `${lastSavedEvent.title} — ${when}${whereLine} · Connect Sports Pro`;
}

function shareTo(network){
  const text = buildShareText();
  const url = location.origin + '/udalosti/';
  let target = null;
  if(network==='facebook'){
    target = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}&quote=${encodeURIComponent(text)}`;
  } else if(network==='whatsapp'){
    target = `https://wa.me/?text=${encodeURIComponent(text + ' ' + url)}`;
  } else if(network==='x'){
    target = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
  }
  if(target){ window.open(target, '_blank', 'noopener'); return; }

  // Instagram has no web share-intent URL, and "copy link" has nothing
  // meaningful to link to yet — both fall back to copying the text.
  navigator.clipboard?.writeText(text + ' ' + url).then(()=>{
    toast(network==='instagram' ? 'Text skopírovaný — vlož ho do Instagram príbehu/príspevku.' : 'Odkaz skopírovaný ✓');
  }).catch(()=>{
    toast('Nepodarilo sa skopírovať.', true);
  });
}
</script>
