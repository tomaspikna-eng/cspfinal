<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Udalosť · Connect Sports Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/csp-auth.js"></script>
<style>
:root{--bg:#060608;--panel:#0d0d11;--field:#14141a;--line:rgba(255,255,255,.08);--text:#f4f4f8;--soft:#a8a8b8;--gold:#d4a843;--green:#1ec86a;--red:#d94f4f}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px Arial,sans-serif}a{color:inherit;text-decoration:none}
header{border-bottom:1px solid var(--line);background:rgba(6,6,8,.94);position:sticky;top:0}.top{max-width:920px;margin:auto;padding:18px 20px;display:flex;justify-content:space-between}.brand{font-weight:900}.gold{color:var(--gold)}
main{max-width:920px;margin:auto;padding:36px 20px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px;margin-bottom:20px}
h1,h2{margin-top:0}.sub{color:var(--soft);line-height:1.5}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.full{grid-column:1/-1}
label{display:block;font-size:12px;color:var(--soft);font-weight:700;margin-bottom:6px}input,select,textarea{width:100%;padding:12px 13px;border-radius:10px;border:1px solid var(--line);background:var(--field);color:var(--text)}
textarea{min-height:110px;resize:vertical}.actions{display:flex;justify-content:flex-end;margin-top:18px}.btn{padding:13px 18px;border:0;border-radius:10px;background:var(--gold);font-weight:800;cursor:pointer}.btn:disabled{opacity:.55}
.notice{padding:13px 15px;border-radius:10px;margin-bottom:18px;background:rgba(30,200,106,.11);border:1px solid rgba(30,200,106,.28);color:#a9f3c8}.error{background:rgba(217,79,79,.1);border-color:rgba(217,79,79,.3);color:#ffb1b1}
.event-list{display:flex;flex-direction:column;gap:9px}.event-row{display:grid;grid-template-columns:1.3fr 1fr auto;gap:14px;padding:14px 16px;border:1px solid var(--line);border-radius:12px;background:var(--field)}.club{font-weight:800}.type{color:var(--soft)}.date{color:var(--gold)}
.hidden{display:none}.detail{display:grid;grid-template-columns:1fr 1fr;gap:14px}.item{padding:14px;border:1px solid var(--line);border-radius:11px;background:var(--field)}.item small{display:block;color:var(--soft);margin-bottom:5px;text-transform:uppercase;font-size:10px}
@media(max-width:680px){.grid,.detail,.event-row{grid-template-columns:1fr}.full{grid-column:auto}.actions .btn{width:100%}}
</style>
</head>
<body>
<header><div class="top"><a class="brand" href="/"><span class="gold">Connect</span>Sports<span class="gold">Pro</span></a><a class="gold" href="/profil/">Profil</a></div></header>
<main>
<h1 id="pageTitle">Vytvoriť udalosť</h1>
<p class="sub" id="pageSubtitle">Udalosť sa po publikovaní zobrazí v kalendári udalostí.</p>
<div id="notice"></div>

<section class="panel" id="formPanel">
<h2>Základné informácie</h2>
<form id="eventForm">
<div class="grid">
<div class="full"><label>Názov udalosti</label><input id="title" required></div>
<div><label>Typ udalosti</label><select id="eventType" required><option value="">Vyber typ</option><option>Turnaj</option><option>Liga</option><option>Tréning</option><option>Klubová udalosť</option><option>Otvorený deň</option><option>Iné</option></select></div>
<div><label>Šport</label><input id="sport" required></div>
<div><label>Disciplína</label><input id="discipline"></div>
<div><label>Miesto</label><input id="location"></div>
<div><label>Mesto</label><input id="city"></div>
<div><label>Začiatok</label><input id="startsAt" type="datetime-local" required></div>
<div><label>Viditeľnosť</label><select id="visibility"><option value="public">Verejná</option><option value="unlisted">Nezaradená</option><option value="private">Súkromná</option></select></div>
<div><label>Stav</label><select id="status"><option value="published">Publikovať</option><option value="draft">Koncept</option></select></div>
<div class="full"><label>Fotografia udalosti</label><input id="coverFile" type="file" accept="image/jpeg,image/png,image/webp"><div class="sub" style="margin-top:6px;font-size:12px">JPG, PNG alebo WEBP, maximálne 5 MB.</div></div>
<div class="full"><label>Popis</label><textarea id="description"></textarea></div>
</div>
<div class="actions"><button class="btn" id="submitBtn">Vytvoriť udalosť</button></div>
</form>
</section>

<section class="panel hidden" id="detailPanel"><h2>Detail udalosti</h2><div class="detail" id="detailGrid"></div></section>
<section class="panel"><h2>Kalendár udalostí</h2><div class="event-list" id="calendarList">Načítavam…</div></section>
</main>

<script>
(()=>{
const db=window.cspAuth?.client,$=id=>document.getElementById(id);
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
const fmt=v=>v?new Date(v).toLocaleString('sk-SK',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
function show(m,e=false){$('notice').innerHTML=m?`<div class="notice ${e?'error':''}">${esc(m)}</div>`:''}
async function getSession(){return (await db.auth.getSession()).data.session}
async function getClub(uid){const r=await db.from('clubs').select('id,name').eq('owner_id',uid).limit(1).maybeSingle();if(r.error)throw r.error;return r.data}
async function calendar(){
 const r=await db.rpc('get_public_event_calendar',{p_limit:6});
 if(r.error){$('calendarList').innerHTML=esc(r.error.message);return}
 $('calendarList').innerHTML=(r.data||[]).map(e=>`<a class="event-row" href="/udalost/?id=${e.id}"><div class="club">${esc(e.club_name||'Connect Sports Pro')}</div><div class="type">${esc(e.event_type||e.title||'Udalosť')}</div><div class="date">${esc(fmt(e.starts_at))}</div></a>`).join('')||'Žiadne nadchádzajúce udalosti.';
}
async function detail(id){
 const r=await db.from('events').select('*,clubs(name)').eq('id',id).maybeSingle();
 if(r.error||!r.data)return show(r.error?.message||'Udalosť sa nenašla.',true);
 const e=r.data;$('pageTitle').textContent=e.title;$('pageSubtitle').textContent=e.event_type||'Udalosť';$('formPanel').classList.add('hidden');$('detailPanel').classList.remove('hidden');
 $('detailGrid').innerHTML=`<div class="item"><small>Klub</small><strong>${esc(e.clubs?.name||'—')}</strong></div><div class="item"><small>Typ</small><strong>${esc(e.event_type||'—')}</strong></div><div class="item"><small>Šport</small><strong>${esc(e.sport||'—')}</strong></div><div class="item"><small>Disciplína</small><strong>${esc(e.discipline||'—')}</strong></div><div class="item"><small>Dátum</small><strong>${esc(fmt(e.starts_at))}</strong></div><div class="item"><small>Miesto</small><strong>${esc([e.location_text,e.city].filter(Boolean).join(', ')||'—')}</strong></div><div class="item full"><small>Popis</small><strong>${esc(e.description||'—')}</strong></div>`;
}

async function uploadCover(userId){
 const file=$('coverFile').files?.[0];
 if(!file)return null;
 if(file.size>5*1024*1024)throw Error('Fotografia môže mať maximálne 5 MB.');
 if(!['image/jpeg','image/png','image/webp'].includes(file.type))throw Error('Použi JPG, PNG alebo WEBP.');
 const ext=file.type==='image/png'?'png':file.type==='image/webp'?'webp':'jpg';
 const objectPath=`${userId}/${crypto.randomUUID()}.${ext}`;
 const up=await db.storage.from('event-covers').upload(objectPath,file,{contentType:file.type,cacheControl:'3600',upsert:false});
 if(up.error)throw up.error;
 return db.storage.from('event-covers').getPublicUrl(objectPath).data.publicUrl;
}

$('eventForm').addEventListener('submit',async ev=>{
 ev.preventDefault();show('');$('submitBtn').disabled=true;$('submitBtn').textContent='Ukladám…';
 try{
  const s=await getSession();if(!s)throw Error('Pre vytvorenie udalosti sa musíš prihlásiť.');
  const club=await getClub(s.user.id),start=new Date($('startsAt').value);
  const coverImageUrl=await uploadCover(s.user.id);
  const payload={owner_id:s.user.id,club_id:club?.id||null,title:$('title').value.trim(),event_type:$('eventType').value,sport:$('sport').value.trim(),discipline:$('discipline').value.trim()||null,location_text:$('location').value.trim()||null,city:$('city').value.trim()||null,starts_at:start.toISOString(),description:$('description').value.trim()||null,visibility:$('visibility').value,status:$('status').value,registration_enabled:false,cover_image_url:coverImageUrl};
  const r=await db.from('events').insert(payload).select('id').single();if(r.error)throw r.error;
  show('Udalosť bola vytvorená a uložená do kalendára.');$('notice').innerHTML+=` <a class="gold" href="/udalost/?id=${r.data.id}">Zobraziť udalosť</a>`;$('eventForm').reset();await calendar();
 }catch(e){show(e.message,true)}finally{$('submitBtn').disabled=false;$('submitBtn').textContent='Vytvoriť udalosť'}
});
if(!db)return show('Supabase klient nie je dostupný.',true);
const id=new URLSearchParams(location.search).get('id');if(id)detail(id);calendar();
})();
</script>
</body>
</html>
