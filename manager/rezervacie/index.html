<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Rezervácie — Club Manager</title>
<meta name="description" content="Rezervuj biliard, šípky alebo bowling — vyber si voľný slot v tabuľke."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/csp-auth.js"></script>
<script src="/assets/csp-manager.js"></script>
<style>
:root{
  --bg:#08080c;--bg-soft:#0c0c12;--card:#131319;--card-2:#16161d;
  --line:rgba(255,255,255,.08);--line-2:rgba(255,255,255,.05);
  --fg:#fafafa;--muted:#7e7e8a;--muted-2:#9a9aa6;
  --gold:#d4a843;--gold-soft:#a8862e;--gold-dim:rgba(212,168,67,.12);--gold-b:rgba(212,168,67,.3);
  --green:#26d07d;--green-dark:#06230f;--green-dim:rgba(38,208,125,.12);--green-b:rgba(38,208,125,.4);
  --red:#e35149;--red-dim:rgba(227,81,73,.18);--red-b:rgba(227,81,73,.45);
  --radius:12px;--font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--fg);font-size:14px;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
input,select,textarea{font-family:inherit;background:var(--bg);border:1px solid var(--line);color:var(--fg);border-radius:9px;padding:10px 12px;font-size:14px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
.hidden{display:none!important}

/* SHELL */
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
@media(max-width:900px){.app{grid-template-columns:1fr}}
.sidebar{background:var(--bg-soft);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
@media(max-width:900px){.sidebar{position:fixed;inset:0 auto 0 0;width:260px;z-index:200;transform:translateX(-100%);transition:.22s}.sidebar.open{transform:none}}
.sb-brand{padding:20px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--line)}
.sb-mark{width:34px;height:34px;border-radius:9px;display:block;object-fit:cover}
.sb-word{font-weight:800;font-size:.92rem}.sb-word .g{color:var(--gold)}.sb-word .w{color:#fff}
.sb-sub{font-family:var(--mono);font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:3px}
.sb-nav{padding:14px 12px;flex:1}
.sb-section{padding:14px 10px 6px;font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.sb-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;font-size:.86rem;font-weight:500;color:var(--muted-2);transition:.12s}
.sb-item:hover{background:rgba(255,255,255,.03);color:var(--fg)}
.sb-item.active{background:var(--gold-dim);color:var(--gold);font-weight:600}
.sb-item .ico{width:20px;text-align:center;font-size:1.05rem}
.sb-foot{padding:12px;border-top:1px solid var(--line)}
.sb-signout{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:9px;color:var(--muted-2);font-size:.84rem;border:1px solid var(--line);transition:.12s}
.sb-signout:hover{border-color:var(--red-b);color:var(--red);background:var(--red-dim)}

.main{display:flex;flex-direction:column;min-width:0}
.topbar{position:sticky;top:0;z-index:20;background:rgba(8,8,12,.86);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:14px 26px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.tb-left{display:flex;align-items:center;gap:14px}
.tb-toggle{display:none;font-size:1.4rem}@media(max-width:900px){.tb-toggle{display:block}}
.tb-title{font-size:1.05rem;font-weight:700}.tb-title .club{color:var(--gold)}
.tb-user{display:flex;align-items:center;gap:9px;padding:5px 12px 5px 5px;border-radius:99px;border:1px solid var(--line);font-size:.82rem;font-weight:600}
.tb-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-soft));display:flex;align-items:center;justify-content:center;color:#1a1000;font-weight:800;font-size:.78rem}

.content{padding:28px 26px 60px;max-width:1280px;width:100%;margin:0 auto}
@media(max-width:600px){.content{padding:20px 16px 50px}}
.page-head{margin-bottom:22px}
.page-head h1{font-size:1.9rem;font-weight:800;color:var(--gold)}
.page-head p{color:var(--muted-2);margin-top:4px;font-size:.92rem}

/* FILTERS */
.filters{display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap;margin-bottom:18px}
.filter-field label{display:block;font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px}
.filter-field input{width:auto}
.sport-tabs{display:flex;gap:8px;flex-wrap:wrap}
.sport-tab{display:flex;align-items:center;gap:7px;padding:10px 14px;border-radius:10px;border:1px solid var(--line);font-weight:600;font-size:.85rem;color:var(--muted-2);transition:.12s}
.sport-tab:hover{color:var(--fg)}
.sport-tab.active{border-color:var(--gold);background:var(--gold-dim);color:var(--gold)}

/* LEGEND */
.legend{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:14px;font-size:.78rem}
.legend .item{display:flex;align-items:center;gap:7px;color:var(--muted-2)}
.legend .sw{width:24px;height:16px;border-radius:5px;border:1px solid}
.sw.free{background:var(--green-dim);border-color:var(--green-b)}
.sw.busy{background:var(--red-dim);border-color:var(--red-b)}
.sw.maint{background:rgba(255,255,255,.05);border-color:var(--line)}

/* GRID */
.grid-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--card)}
table{width:100%;border-collapse:collapse;font-size:.82rem;min-width:760px}
th,td{border-bottom:1px solid var(--line)}
thead th{padding:10px 8px;text-align:center;font-size:.66rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
thead th.corner{position:sticky;left:0;z-index:10;background:var(--card);border-right:1px solid var(--line);text-align:left;padding-left:14px}
tbody th{position:sticky;left:0;z-index:10;background:var(--card);border-right:1px solid var(--line);text-align:left;padding:8px 14px;font-weight:700;color:var(--gold);white-space:nowrap}
td{padding:4px}
.slot{height:38px;width:100%;min-width:42px;border-radius:7px;border:1px solid;font-size:.82rem;font-weight:700;transition:.1s}
.slot.free{border-color:var(--green-b);background:var(--green-dim);color:var(--green)}
.slot.free:hover{background:rgba(38,208,125,.25)}
.slot.busy{border-color:var(--red-b);background:var(--red-dim);color:var(--red);cursor:not-allowed}
.slot.maint{border-color:var(--line);background:rgba(255,255,255,.04);color:var(--muted);cursor:not-allowed}
.slot.past{border-color:var(--line);background:rgba(255,255,255,.02);color:rgba(255,255,255,.15);cursor:not-allowed}

.empty{padding:40px;text-align:center;color:var(--muted-2)}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;padding:0}
@media(min-width:560px){.overlay{align-items:center;padding:16px}}
.modal{width:100%;max-width:460px;background:var(--card);border:1px solid var(--line);border-radius:18px 18px 0 0;padding:24px;box-shadow:0 -10px 40px rgba(0,0,0,.5);max-height:92vh;overflow-y:auto}
@media(min-width:560px){.modal{border-radius:18px}}
.modal h2{font-size:1.5rem;font-weight:800;color:var(--gold)}
.modal .slot-meta{color:var(--muted-2);font-size:.86rem;margin-top:4px}
.form{margin-top:20px;display:flex;flex-direction:column;gap:14px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fld label{display:block;font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px}
.found{font-size:.76rem;color:var(--green);margin-top:-8px}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:8px}
.btn{padding:11px 18px;border-radius:10px;font-weight:700;font-size:.86rem;transition:.13s;border:1px solid var(--line)}
.btn-cancel:hover{background:rgba(255,255,255,.05)}
.btn-confirm{background:var(--green);border-color:var(--green);color:var(--green-dark)}
.btn-confirm:hover{background:#33dd8a}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:var(--green-dark);font-weight:700;padding:12px 22px;border-radius:99px;opacity:0;transition:.2s;pointer-events:none;z-index:200}
.toast.show{opacity:1}.toast.err{background:var(--red);color:#fff}

.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150}
.backdrop.show{display:block}@media(min-width:901px){.backdrop{display:none!important}}

.gate-overlay{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
.gate-loading{color:var(--muted-2);text-align:center;padding:60px 20px}
</style>
</head>

<script>
/* ════════════════════════════════════════════════
   REAL AUTH + CLUB GATE
   Replaces the old fully-open page (no login check, hardcoded "Ján
   Novák", logout was an alert() stub) with real Supabase auth via
   cspAuth/cspManager. No club yet -> redirect to the Dashboard, which
   has the "create your club" flow (kept in one place rather than
   duplicated across pages).
════════════════════════════════════════════════ */
(async function initClubManagerAuth(){
  const ctx = await cspManager.requireClubManagerAccess();
  if(!ctx) return; // already redirected (no session / no access / no club)

  document.getElementById('tbClubName').textContent = ctx.club.name;
  const displayName = (ctx.profile && ctx.profile.full_name) || ctx.session.user.email;
  const initials = (displayName.trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase()) || '??';
  document.getElementById('tbUserName').textContent = displayName;
  document.getElementById('tbUserAv').textContent = initials;

  await loadVenues(ctx.club.id);
  document.getElementById('loadingGate').style.display = 'none';
})();

/* Real venues, replacing the old hardcoded `stations` seed. select('*')
   so this keeps working whether or not migration 0012 (hourly_rate/
   status) has landed yet — missing columns just come back undefined. */
async function loadVenues(clubId){
  try{
    const { data, error } = await cspAuth.withTimeout(
      cspAuth.client.from('venues').select('*').eq('club_id', clubId).order('name'),
      8000, 'venues lookup'
    );
    if(error){ console.error('[rezervacie] Could not load venues:', error); toast('Nepodarilo sa načítať športoviská.', true); return; }
    stations = (data||[]).map(v => ({
      id: v.id,
      name: v.name,
      sport_type: v.sport || 'iné',
      status: v.status || 'available',
      hourly_rate: v.hourly_rate != null ? v.hourly_rate : 0,
    }));
  }catch(err){
    console.error('[rezervacie] loadVenues timed out:', err);
    toast('Nepodarilo sa načítať športoviská.', true);
    stations = [];
  }
  buildSportTabs();
}

/* Sport tabs are generated from whatever sports the club's real venues
   actually have — not a fixed billiard/darts/bowling set, since venues
   (migration 0009) allow any free-text sport. */
function buildSportTabs(){
  const wrap=document.getElementById('sportTabs');
  const sports=[...new Set(stations.map(s=>s.sport_type))];
  if(sports.length===0){
    wrap.innerHTML='';
    currentSport=null;
    document.getElementById('gridArea').innerHTML='<div class="empty">Zatiaľ nemáš pridané žiadne športoviská. <a href="/manager/sportoviska/" style="color:var(--gold)">Pridať prvé →</a></div>';
    return;
  }
  currentSport = sports[0];
  wrap.innerHTML = sports.map((sp,i)=>{
    const icon = SPORT_ICON[sp] || SPORT_ICON_FALLBACK;
    return `<button class="sport-tab${i===0?' active':''}" data-sport="${sp}" onclick="setSport('${sp}',this)">${icon} ${sp}</button>`;
  }).join('');
  renderGrid();
}

document.getElementById('signOutBtn')?.addEventListener('click', () => cspManager.signOut());

/* ════════════════════════════════════════════════
   Zdieľané sklady (localStorage) — neskôr Supabase
════════════════════════════════════════════════ */
const K_CUSTOMERS="clubm_customers", K_RESERVATIONS="clubm_reservations";
const SPORT_ICON={billiard:'🎱',darts:'🎯',bowling:'🎳'}, SPORT_ICON_FALLBACK='🏆';
const HOURS=Array.from({length:14},(_,i)=>10+i); // 10:00–23:00

function load(k,seed){try{const r=localStorage.getItem(k);if(r)return JSON.parse(r);}catch(e){}localStorage.setItem(k,JSON.stringify(seed));return seed;}
function save(k,v){localStorage.setItem(k,JSON.stringify(v));}

/* Real venues (replaces the old hardcoded `stations` seed array) — loaded
   async in initClubManagerAuth() once the current club is known.
   customers/reservations stay on localStorage for now (no real booking
   table exists yet — flagged as a follow-up, not invented here). */
let stations=[];
let currentSport=null; // set once real venues load, from the first sport found
let customers=load(K_CUSTOMERS,[
  {id:'c1',name:'Peter Horváth',phone:'0905 123 456',email:'peter@example.sk'},
  {id:'c2',name:'Mária Kováčová',phone:'0911 222 333',email:''},
]);
const _today=new Date(), _ymd=_today.toISOString().slice(0,10);
let reservations=load(K_RESERVATIONS,[
  {id:'r1',station_id:'s1',start_at:`${_ymd}T18:00:00`,end_at:`${_ymd}T20:00:00`,status:'confirmed',customer_name:'Peter Horváth',customer_phone:'0905 123 456',party_size:2},
  {id:'r2',station_id:'s4',start_at:`${_ymd}T19:00:00`,end_at:`${_ymd}T20:00:00`,status:'confirmed',customer_name:'Mária Kováčová',customer_phone:'0911 222 333',party_size:4},
]);

let pick=null; // {station, hour}

/* ── Pomocné ── */
function slotStart(date,h){return new Date(`${date}T${String(h).padStart(2,'0')}:00:00`);}
function findReservation(stationId,date,h){
  const ss=slotStart(date,h), se=new Date(ss.getTime()+3600000);
  return reservations.find(r=>{
    if(r.station_id!==stationId||r.status==='cancelled')return false;
    const rs=new Date(r.start_at), re=new Date(r.end_at);
    return rs<se && re>ss;
  })||null;
}

function setSport(sp,btn){
  currentSport=sp;
  document.querySelectorAll('.sport-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

/* ── Mriežka ── */
function renderGrid(){
  const date=document.getElementById('dateInput').value;
  const list=stations.filter(s=>s.sport_type===currentSport);
  const area=document.getElementById('gridArea');
  if(list.length===0){area.innerHTML='<div class="empty">Žiadne športoviská v tejto kategórii.</div>';return;}

  let html='<div class="grid-wrap"><table><thead><tr><th class="corner">Stôl / Hodina</th>';
  HOURS.forEach(h=>html+=`<th>${String(h).padStart(2,'0')}:00</th>`);
  html+='</tr></thead><tbody>';

  list.forEach(st=>{
    html+=`<tr><th>${SPORT_ICON[st.sport_type]||SPORT_ICON_FALLBACK} ${st.name}</th>`;
    HOURS.forEach(h=>{
      const res=findReservation(st.id,date,h);
      const isMaint=st.status==='maintenance';
      const isPast=slotStart(date,h).getTime()<Date.now();
      let cls,txt,title,dis=true;
      if(res){cls='busy';txt='●';title=`${res.customer_name} (${res.party_size||1} os.)`;}
      else if(isMaint){cls='maint';txt='—';title='Mimo prevádzky';}
      else if(isPast){cls='past';txt='·';title='V minulosti';}
      else{cls='free';txt='+';title='Voľné — rezervovať';dis=false;}
      html+=`<td><button class="slot ${cls}" title="${title}" ${dis?'disabled':`onclick="openModal('${st.id}',${h})"`}>${txt}</button></td>`;
    });
    html+='</tr>';
  });
  html+='</tbody></table></div>';
  area.innerHTML=html;
}

/* ── Modal ── */
function openModal(stationId,hour){
  const st=stations.find(s=>s.id===stationId);
  pick={station:st,hour};
  const date=document.getElementById('dateInput').value;
  const end=new Date(slotStart(date,hour).getTime()+3600000);
  const endStr=`${String(hour+1).padStart(2,'0')}:00`;
  document.getElementById('modalArea').innerHTML=`
    <div class="overlay" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <h2>${st.name}</h2>
        <p class="slot-meta">${date} · ${String(hour).padStart(2,'0')}:00 – ${endStr} · ${(+st.hourly_rate).toFixed(2)} € / hod</p>
        <div class="form">
          <div class="row2">
            <div class="fld"><label>Dĺžka</label>
              <select id="mDuration" onchange="updateEnd()">
                <option value="60">1 hodina</option><option value="120">2 hodiny</option>
                <option value="180">3 hodiny</option><option value="240">4 hodiny</option>
              </select>
            </div>
            <div class="fld"><label>Počet osôb</label><input type="number" id="mParty" min="1" max="20" value="2"/></div>
          </div>
          <div class="fld"><label>Telefón * (vyhľadá zákazníka)</label><input id="mPhone" placeholder="0905 …" maxlength="30" oninput="lookupCustomer()"/></div>
          <p class="found hidden" id="mFound">✓ Existujúci zákazník</p>
          <div class="fld"><label>Meno *</label><input id="mName" maxlength="100"/></div>
          <div class="fld"><label>E-mail</label><input type="email" id="mEmail" maxlength="255"/></div>
          <div class="fld"><label>Poznámka</label><textarea id="mNotes" rows="2" maxlength="500"></textarea></div>
          <div class="modal-actions">
            <button class="btn btn-cancel" onclick="closeModal()">Zrušiť</button>
            <button class="btn btn-confirm" onclick="submitReservation()">Potvrdiť rezerváciu</button>
          </div>
        </div>
      </div>
    </div>`;
}
function closeModal(e){if(e&&e.target&&!e.target.classList.contains('overlay'))return;document.getElementById('modalArea').innerHTML='';pick=null;}
function updateEnd(){}

function lookupCustomer(){
  const q=document.getElementById('mPhone').value.replace(/\s/g,'');
  if(q.length<3){document.getElementById('mFound').classList.add('hidden');return;}
  const c=customers.find(x=>x.phone.replace(/\s/g,'').includes(q));
  if(c){
    document.getElementById('mFound').classList.remove('hidden');
    if(!document.getElementById('mName').value)document.getElementById('mName').value=c.name;
    if(!document.getElementById('mEmail').value&&c.email)document.getElementById('mEmail').value=c.email;
  }else document.getElementById('mFound').classList.add('hidden');
}

function submitReservation(){
  const date=document.getElementById('dateInput').value;
  const name=document.getElementById('mName').value.trim();
  const phone=document.getElementById('mPhone').value.trim();
  const party=+document.getElementById('mParty').value;
  const duration=+document.getElementById('mDuration').value;
  const email=document.getElementById('mEmail').value.trim();
  const notes=document.getElementById('mNotes').value.trim();
  if(!name||!phone){toast('Vyplň meno a telefón.',true);return;}
  if(party<1){toast('Počet osôb musí byť aspoň 1.',true);return;}

  const start=slotStart(date,pick.hour);
  const end=new Date(start.getTime()+duration*60000);
  // konflikt
  const conflict=reservations.some(r=>{
    if(r.station_id!==pick.station.id||r.status==='cancelled')return false;
    return new Date(r.start_at)<end && new Date(r.end_at)>start;
  });
  if(conflict){toast('Tento termín je už obsadený.',true);return;}

  // upsert zákazník
  let c=customers.find(x=>x.phone.replace(/\s/g,'')===phone.replace(/\s/g,''));
  if(c){c.name=name;if(email)c.email=email;}
  else{c={id:'c'+Date.now(),name,phone,email};customers.push(c);}
  save(K_CUSTOMERS,customers);

  reservations.push({id:'r'+Date.now(),station_id:pick.station.id,start_at:start.toISOString(),end_at:end.toISOString(),status:'confirmed',customer_name:name,customer_phone:phone,customer_email:email,party_size:party,notes});
  save(K_RESERVATIONS,reservations);

  closeModal();
  renderGrid();
  toast(`Rezervácia potvrdená — ${pick.station.name}, ${String(pick.hour).padStart(2,'0')}:00`);
}

function toast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast'+(err?' err':''),2200);}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('backdrop').classList.toggle('show');}

/* INIT */
document.getElementById('dateInput').value=_ymd;
document.getElementById('dateInput').min=_ymd;
/* renderGrid() now runs from buildSportTabs() once real venues have loaded — not here, before they exist. */
</script>
