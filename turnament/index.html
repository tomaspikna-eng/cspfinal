<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CSP Tournament Manager</title>
<meta name="description" content="Connect Sports Pro — správa turnajov: Round Robin, Single KO, Double KO a kombinácie. Pre plán ULTRA."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#08080c;--bg-2:#0c0c12;--card:#13131a;--card-2:#181820;
  --line:rgba(255,255,255,.08);--line-2:rgba(255,255,255,.05);
  --fg:#f4f4f6;--muted:#82828e;--muted-2:#a2a2ae;
  --gold:#d4a843;--gold-soft:#a8862e;--gold-dim:rgba(212,168,67,.12);--gold-b:rgba(212,168,67,.32);
  --green:#26d07d;--green-dark:#06230f;--green-dim:rgba(38,208,125,.14);
  --red:#e35149;--red-dim:rgba(227,81,73,.14);
  --blue:#5aa9e6;
  --radius:14px;--font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--fg);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;background:var(--bg-2);border:1px solid var(--line);color:var(--fg);border-radius:9px;padding:11px 13px;font-size:14px;outline:none;width:100%}
input:focus,select:focus{border-color:var(--gold)}
.hidden{display:none!important}
.mono{font-family:var(--mono)}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:40;background:rgba(8,8,12,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.topbar-in{max-width:1200px;margin:0 auto;padding:0 22px;height:62px;display:flex;align-items:center;gap:16px}
.brand{display:flex;align-items:center;gap:11px}
.brand-mark{width:34px;height:34px;border-radius:9px;display:block;object-fit:cover;box-shadow:0 4px 12px rgba(212,168,67,.2)}
.brand-word{font-weight:800;font-size:.96rem}.brand-word .g{color:var(--gold)}.brand-word .w{color:#fff}
.brand-sub{font-family:var(--mono);font-size:.58rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);display:block;margin-top:1px}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.ultra-chip{font-family:var(--mono);font-size:.6rem;font-weight:700;letter-spacing:.1em;background:linear-gradient(135deg,var(--gold),var(--gold-soft));color:#1a1000;padding:4px 9px;border-radius:6px}
.tb-user{display:flex;align-items:center;gap:8px;font-size:.84rem;font-weight:600;color:var(--muted-2)}
.tb-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-soft));display:flex;align-items:center;justify-content:center;color:#1a1000;font-weight:800;font-size:.78rem}
.link-btn{font-size:.82rem;font-weight:600;color:var(--muted-2)}.link-btn:hover{color:var(--gold)}

.wrap{max-width:1200px;margin:0 auto;padding:32px 22px 70px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:10px;font-weight:700;font-size:.9rem;transition:.14s;border:1px solid var(--line)}
.btn-primary{background:var(--gold);border-color:var(--gold);color:#1a1000}.btn-primary:hover{background:#e3bd57}
.btn-green{background:var(--green);border-color:var(--green);color:var(--green-dark)}.btn-green:hover{background:#33dd8a}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}

/* ── GATE (landing / access) ── */
.gate{min-height:calc(100vh - 62px);display:flex;align-items:center;justify-content:center;padding:40px 22px}
.gate-card{max-width:540px;text-align:center}
.gate-icon{font-size:3.4rem;margin-bottom:18px}
.gate h1{font-size:2.4rem;font-weight:900;letter-spacing:-.02em;line-height:1.05}
.gate h1 .g{color:var(--gold)}
.gate .lead{color:var(--muted-2);font-size:1.05rem;margin-top:14px;line-height:1.6}
.gate-features{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:26px 0}
.gate-feat{font-size:.8rem;font-weight:600;color:var(--muted-2);background:var(--card);border:1px solid var(--line);border-radius:99px;padding:8px 14px}
.gate-cta{display:flex;flex-direction:column;gap:12px;align-items:center;margin-top:8px}
.gate-cta .btn{width:100%;max-width:300px;font-size:.95rem;padding:14px}
.gate-note{font-size:.78rem;color:var(--muted);margin-top:6px}
.demo-login{margin-top:28px;padding-top:20px;border-top:1px solid var(--line-2)}
.demo-login button{font-size:.78rem;color:var(--muted);text-decoration:underline}
.demo-login button:hover{color:var(--gold)}

/* ── TGATE — nový úvodný (nezalogovaný) screen s animovaným pavúkom ── */
.tgate{min-height:calc(100vh - 62px);padding:56px 22px 40px}
.tgate-in{max-width:1180px;margin:0 auto}
.tgate-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:48px;align-items:center}
@media(max-width:940px){.tgate-grid{grid-template-columns:1fr}}
.tgate-eyebrow{font-family:var(--mono);font-size:.68rem;letter-spacing:.16em;color:var(--gold);font-weight:700;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:9px}
.tgate-eyebrow::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px var(--green-dim)}
.tgate h1{font-size:clamp(2.2rem,4.4vw,3.4rem);font-weight:900;letter-spacing:-.02em;line-height:1.03}
.tgate h1 .g{color:var(--gold)}
.tgate .lead{color:var(--muted-2);font-size:1.05rem;margin-top:18px;max-width:480px;line-height:1.6}
.tgate-features{display:flex;flex-wrap:wrap;gap:9px;margin-top:24px}
.tgate-cta{display:flex;gap:12px;margin-top:30px;flex-wrap:wrap}
.tgate-note{font-size:.78rem;color:var(--muted);margin-top:12px}
.tgate-demo{margin-top:22px}
.tgate-demo button{font-size:.78rem;color:var(--muted);text-decoration:underline}
.tgate-demo button:hover{color:var(--gold)}

.bracket-wrap{position:relative;aspect-ratio:6/5;border-radius:18px;background:radial-gradient(ellipse at 70% 20%,rgba(212,168,67,.07),transparent 60%),var(--card);border:1px solid var(--line);overflow:hidden}
.bracket-wrap svg{width:100%;height:100%;display:block}
.br-box{fill:var(--card-2);stroke:var(--line)}
.br-box.live{stroke:var(--green);stroke-width:1.4}
.br-name{font-family:var(--mono);font-size:9px;fill:var(--muted-2)}
.br-name.win{fill:var(--fg);font-weight:700}
.br-line{stroke:var(--gold);stroke-opacity:.35;stroke-width:1.2;fill:none}
.br-flow{stroke:var(--gold);stroke-width:1.6;fill:none;stroke-dasharray:5 6;animation:brflow 1.4s linear infinite}
@keyframes brflow{to{stroke-dashoffset:-22}}
.br-live-dot{animation:brpulse 1.8s ease-in-out infinite}
@keyframes brpulse{0%,100%{opacity:.5;r:3.2}50%{opacity:1;r:5}}
.br-trophy{animation:brglow 2.6s ease-in-out infinite}
@keyframes brglow{0%,100%{opacity:.75}50%{opacity:1}}
@media(prefers-reduced-motion:reduce){.br-flow,.br-live-dot,.br-trophy{animation:none}}
.bracket-caption{position:absolute;left:16px;bottom:14px;font-family:var(--mono);font-size:.64rem;color:var(--muted);letter-spacing:.03em}
.bracket-caption b{color:var(--green)}

.tgate-statement{text-align:center;padding:46px 0 6px;font-size:clamp(1.2rem,2.4vw,1.6rem);font-weight:800;color:var(--muted-2);max-width:760px;margin:0 auto}
.tgate-statement .g{color:var(--gold)}

/* upgrade prompt */
.upsell{max-width:480px;text-align:center}
.upsell .badge{display:inline-block;font-family:var(--mono);font-size:.66rem;font-weight:700;letter-spacing:.12em;background:var(--gold-dim);color:var(--gold);padding:6px 12px;border-radius:7px;margin-bottom:16px}

/* ── DASHBOARD ── */
.page-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.page-head h1{font-size:1.8rem;font-weight:800}
.page-head p{color:var(--muted);font-size:.9rem;margin-top:3px}
.t-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.t-card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;cursor:pointer;transition:.15s}
.t-card:hover{border-color:var(--gold-b);transform:translateY(-2px)}
.t-del{position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem;opacity:0;transition:.13s;color:var(--muted)}
.t-card:hover .t-del{opacity:.7}
.t-del:hover{opacity:1!important;background:var(--red-dim);color:var(--red)}
.btn-danger:hover{border-color:var(--red);color:var(--red);background:var(--red-dim)}

/* detail */
.detail-grid{display:grid;grid-template-columns:340px 1fr;gap:22px;align-items:start}
@media(max-width:820px){.detail-grid{grid-template-columns:1fr}}
.detail-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
.dc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.dc-head h3{font-size:.96rem;font-weight:800}

/* match list */
.champ-banner{background:linear-gradient(135deg,var(--gold-dim),rgba(212,168,67,.04));border:1px solid var(--gold-b);border-radius:11px;padding:14px 16px;font-size:1rem;margin-bottom:16px;text-align:center}
.champ-banner b{color:var(--gold)}
.round-block{margin-bottom:18px}
.round-head{display:flex;align-items:center;justify-content:space-between;padding:0 2px 8px;margin-bottom:6px;border-bottom:1px solid var(--line)}
.round-name{font-weight:800;font-size:.92rem}
.round-code{font-size:.66rem;color:var(--muted);background:var(--bg-2);padding:2px 7px;border-radius:5px}
.rr-round-label{font-size:.66rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:12px 0 6px}
.match-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:6px;background:var(--card);transition:.12s}
.match-row.clickable{cursor:pointer}
.match-row.clickable:hover{border-color:var(--gold-b);background:var(--card-2)}
.match-row.done{border-color:rgba(38,208,125,.25)}
.match-row .mt-key{font-size:.68rem;color:var(--muted);width:48px;flex-shrink:0}
.match-row .mt-side{flex:1;font-size:.86rem;font-weight:600}
.match-row .mt-side.right{text-align:right}
.match-row .mt-side.win{color:var(--green);font-weight:800}
.match-row .mt-vs{color:var(--muted);font-size:.74rem}
.match-row .mt-score{font-size:.84rem;font-weight:800;color:var(--fg);min-width:44px;text-align:center}
.match-row .mt-bye{color:var(--muted);font-size:.74rem;font-style:italic}
.match-row .mt-wait{color:var(--muted);font-size:.78rem;font-style:italic}
.match-row .mt-check{color:var(--green);font-weight:800;width:14px}
.match-row .mt-edit{color:var(--muted);font-size:1.1rem;width:14px}

/* standings */
.standings{border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:6px}
.st-head,.st-row{display:grid;grid-template-columns:32px 1fr 36px 36px 48px;gap:8px;padding:9px 12px;align-items:center;font-size:.84rem}
.st-head{background:var(--bg-2);font-family:var(--mono);font-size:.64rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700}
.st-row{border-top:1px solid var(--line-2)}
.st-row span:nth-child(2){font-weight:600}
.st-head2,.st-row2{display:grid;grid-template-columns:30px 1fr 32px 32px 60px 44px 44px;gap:6px;padding:9px 12px;align-items:center;font-size:.82rem}
.st-head2{background:var(--bg-2);font-family:var(--mono);font-size:.6rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700}
.st-row2{border-top:1px solid var(--line-2)}
.st-row2 span:nth-child(2){font-weight:600}
.st-row2.adv{background:rgba(38,208,125,.06)}
.adv-tag{font-family:var(--mono);font-size:.56rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:var(--green-dim);color:var(--green);padding:2px 6px;border-radius:5px;margin-left:6px;vertical-align:middle}

/* result modal */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;padding:16px}
.match-modal{width:100%;max-width:420px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px}
.mm-key{text-align:center;font-size:.74rem;color:var(--gold);margin-bottom:18px;letter-spacing:.1em}
.mm-players{display:flex;align-items:flex-end;gap:14px}
.mm-p{flex:1;text-align:center}
.mm-name{font-weight:700;font-size:.95rem;margin-bottom:10px;min-height:2.4em;display:flex;align-items:center;justify-content:center}
.mm-p input{text-align:center;font-size:1.6rem;font-weight:800;font-family:var(--mono);padding:12px}
.mm-x{font-size:1.6rem;font-weight:800;color:var(--muted);padding-bottom:14px}
.mm-quick{display:flex;gap:8px;margin-top:16px}
.mm-quick button{flex:1;padding:9px;border:1px solid var(--line);border-radius:8px;font-size:.78rem;font-weight:600;color:var(--muted-2)}
.mm-quick button:hover{border-color:var(--gold);color:var(--gold)}
.mm-actions{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:20px}

/* DKO branches + final standings */
.branch-label{font-weight:800;font-size:.82rem;padding:8px 12px;border-radius:9px;margin:16px 0 12px}
.branch-label.win{background:var(--green-dim);color:var(--green)}
.branch-label.lose{background:var(--red-dim);color:var(--red)}
.branch-label.conv{background:var(--gold-dim);color:var(--gold)}
.final-standings{background:linear-gradient(135deg,var(--gold-dim),transparent);border:1px solid var(--gold-b);border-radius:12px;padding:16px;margin-bottom:18px}
.fs-title{font-family:var(--mono);font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.fs-row{display:flex;align-items:center;gap:12px;padding:7px 0;border-bottom:1px solid var(--line-2)}
.fs-row:last-child{border-bottom:none}
.fs-place{font-size:1.1rem;width:32px;text-align:center}
.fs-name{font-weight:700;font-size:.95rem}
.rank-head,.rank-row{display:grid;grid-template-columns:44px 1fr 62px 60px 48px;gap:8px;align-items:center;padding:8px 0;font-size:.85rem}
.rank-head{font-family:var(--mono);font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--line);margin-bottom:4px}
.rank-row{border-bottom:1px solid var(--line-2)}
.rank-row:last-child{border-bottom:none}
.rank-pl{font-weight:700}
.rank-name{font-weight:600}
.rank-games{color:var(--muted)}
.rank-pct{color:var(--gold)}
.rank-row.top{border-radius:9px;margin:2px 0;padding:11px 10px;border-bottom:none}
.rank-row.top .rank-pl{font-size:1.15rem}
.rank-row.top .rank-name{font-weight:800;font-size:1rem}
.rank-row.top1{background:linear-gradient(90deg,rgba(212,168,67,.22),rgba(212,168,67,.04));border:1px solid var(--gold-b)}
.rank-row.top2{background:linear-gradient(90deg,rgba(190,190,200,.16),transparent);border:1px solid rgba(200,200,210,.22)}
.rank-row.top3{background:linear-gradient(90deg,rgba(205,127,50,.16),transparent);border:1px solid rgba(205,127,50,.28)}
.rank-row.top1 .rank-name{color:var(--gold)}
.t-card .fmt{display:inline-block;font-family:var(--mono);font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:6px;background:var(--gold-dim);color:var(--gold);margin-bottom:12px}
.t-card h3{font-size:1.15rem;font-weight:800;line-height:1.2}
.t-card .meta{display:flex;gap:14px;margin-top:12px;font-size:.78rem;color:var(--muted)}
.t-card .meta b{color:var(--muted-2);font-weight:700}
.t-new{background:var(--card);border:1.5px dashed var(--line);border-radius:var(--radius);padding:18px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:150px;color:var(--muted-2)}
.t-new:hover{border-color:var(--gold);color:var(--gold)}
.t-new .plus{font-size:2rem;margin-bottom:6px}
.empty{text-align:center;padding:60px 20px;color:var(--muted-2)}

/* ── WIZARD ── */
.wiz{max-width:640px;margin:0 auto}
.wiz-steps{display:flex;gap:8px;margin-bottom:28px}
.wiz-step{flex:1;height:4px;border-radius:99px;background:var(--line)}
.wiz-step.done{background:var(--gold)}
.wiz-step.active{background:var(--gold);box-shadow:0 0 12px var(--gold-b)}
.wiz-panel h2{font-size:1.5rem;font-weight:800;margin-bottom:4px}
.wiz-panel .sub{color:var(--muted);font-size:.88rem;margin-bottom:22px}
.field{margin-bottom:18px}
.field label{display:block;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:7px}
.field .hint{font-size:.76rem;color:var(--muted);margin-top:6px}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:520px){.opt-grid{grid-template-columns:1fr}}
.opt{border:1px solid var(--line);border-radius:11px;padding:15px;cursor:pointer;transition:.13s;background:var(--card)}
.opt:hover{border-color:var(--gold-b)}
.opt.sel{border-color:var(--gold);background:var(--gold-dim)}
.opt .ot{font-weight:700;font-size:.95rem;display:flex;align-items:center;gap:8px}
.opt .od{font-size:.78rem;color:var(--muted);margin-top:5px;line-height:1.4}
.wiz-nav{display:flex;justify-content:space-between;gap:12px;margin-top:28px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* summary / preview */
.sumbox{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:18px}
.sumrow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line-2);font-size:.88rem}
.sumrow:last-child{border-bottom:none}
.sumrow .k{color:var(--muted)}.sumrow .v{font-weight:700}
.preview{background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:16px;max-height:320px;overflow-y:auto}
.preview h4{font-family:var(--mono);font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.mt-match{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line-2);font-size:.84rem}
.mt-match:last-child{border-bottom:none}
.mt-key{font-family:var(--mono);font-size:.7rem;color:var(--muted);width:48px;flex-shrink:0}
.mt-p{flex:1}.mt-vs{color:var(--muted);font-size:.74rem;margin:0 4px}
.mt-bye{color:var(--green);font-size:.74rem}

/* ── WIZARD (refined) ── */
.wiz{max-width:920px;margin:0 auto;display:grid;grid-template-columns:230px 1fr;gap:36px;align-items:start}
@media(max-width:760px){.wiz{grid-template-columns:1fr;gap:22px}}
.wiz-rail{position:sticky;top:86px}
@media(max-width:760px){.wiz-rail{position:static}}
.wiz-rail .rail-title{font-family:var(--mono);font-size:.62rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:16px}
.rail-step{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;margin-bottom:4px;transition:.13s;color:var(--muted)}
.rail-step .num{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:.74rem;font-weight:700;flex-shrink:0;transition:.13s}
.rail-step .lbl{font-size:.86rem;font-weight:600}
.rail-step.active{background:var(--gold-dim);color:var(--gold)}
.rail-step.active .num{border-color:var(--gold);background:var(--gold);color:#1a1000}
.rail-step.done{color:var(--muted-2)}
.rail-step.done .num{border-color:var(--green);color:var(--green)}
@media(max-width:760px){.wiz-rail{display:flex;gap:6px;overflow-x:auto}.rail-step{flex-shrink:0;padding:8px 10px}.rail-step .lbl{display:none}.rail-step.active .lbl{display:block}}

.wiz-panel{min-height:340px}
.wiz-panel h2{font-size:1.6rem;font-weight:800;letter-spacing:-.01em;margin-bottom:4px}
.wiz-panel .sub{color:var(--muted);font-size:.9rem;margin-bottom:24px}

/* discipline pills */
.pill-row{display:flex;flex-wrap:wrap;gap:8px}
.pill{padding:9px 15px;border-radius:99px;border:1px solid var(--line);font-size:.85rem;font-weight:600;color:var(--muted-2);transition:.12s;background:var(--card)}
.pill:hover{border-color:var(--gold-b);color:var(--fg)}
.pill.sel{border-color:var(--gold);background:var(--gold-dim);color:var(--gold)}

/* format cards with structure */
.fmt-list{display:flex;flex-direction:column;gap:10px}
.fmt-card{display:flex;align-items:center;gap:16px;border:1px solid var(--line);border-radius:13px;padding:16px 18px;cursor:pointer;transition:.13s;background:var(--card)}
.fmt-card:hover{border-color:var(--gold-b)}
.fmt-card.sel{border-color:var(--gold);background:var(--gold-dim)}
.fmt-card .fic{width:46px;height:46px;border-radius:11px;background:var(--bg-2);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.fmt-card.sel .fic{background:rgba(212,168,67,.18)}
.fmt-card .ftxt{flex:1}
.fmt-card .ft{font-weight:800;font-size:1rem}
.fmt-card .fd{font-size:.8rem;color:var(--muted);margin-top:3px;line-height:1.4}
.fmt-card .fstruct{display:flex;align-items:center;gap:6px;margin-top:8px;font-family:var(--mono);font-size:.66rem;color:var(--gold)}
.fstruct .ph{background:var(--gold-dim);padding:2px 7px;border-radius:5px}
.fstruct .arr{color:var(--muted)}
.fmt-section{font-family:var(--mono);font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:18px 0 10px}
.fmt-section:first-child{margin-top:0}

/* players */
.player-add{display:flex;gap:8px;margin-bottom:10px}
.player-add input{flex:1}
.player-add .btn{flex-shrink:0;padding:11px 16px}
.bulk-toggle{font-size:.8rem;color:var(--gold);font-weight:600;cursor:pointer;margin-bottom:14px;display:inline-block}
.bulk-toggle:hover{text-decoration:underline}
.bulk-box{margin-bottom:14px}
.bulk-box textarea{width:100%;min-height:120px;font-family:var(--mono);font-size:.84rem;background:var(--bg-2);border:1px solid var(--line);color:var(--fg);border-radius:10px;padding:12px;resize:vertical;outline:none}
.bulk-box textarea:focus{border-color:var(--gold)}
.player-stats{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--line)}
.player-count{font-size:.9rem;font-weight:700}.player-count b{color:var(--gold);font-family:var(--mono)}
.player-bracket{font-family:var(--mono);font-size:.74rem;color:var(--muted)}
.player-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto}
.pl-item{display:flex;align-items:center;gap:12px;padding:9px 12px;background:var(--card);border:1px solid var(--line);border-radius:9px}
.pl-seed{font-family:var(--mono);font-size:.74rem;font-weight:700;color:var(--gold);width:26px}
.pl-name{flex:1;font-size:.88rem;font-weight:600}
.pl-del{color:var(--muted);font-size:1rem;width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center}
.pl-del:hover{background:var(--red-dim);color:var(--red)}
.player-empty{text-align:center;padding:30px;color:var(--muted);font-size:.86rem;border:1px dashed var(--line);border-radius:11px}
.clear-all{font-size:.78rem;color:var(--muted)}.clear-all:hover{color:var(--red)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:var(--green-dark);font-weight:700;padding:12px 22px;border-radius:99px;opacity:0;transition:.2s;pointer-events:none;z-index:100}
.toast.show{opacity:1}.toast.err{background:var(--red);color:#fff}
.note-box{background:var(--gold-dim);border:1px solid var(--gold-b);border-radius:10px;padding:12px 14px;font-size:.82rem;color:var(--muted-2);margin-top:14px}
.note-box b{color:var(--gold)}
</style>
</head>

<script>
/* ════════════════════════════════════════════════════════════
   CSP TOURNAMENT ENGINE — zamknuté vzorce
════════════════════════════════════════════════════════════ */
const TM = {
  // Seedovanie čistého KO (overené proti zväzu 16/32/64/128/256)
  seedKO(n){
    let seq=[1,2];
    while(seq.length<n){
      const m=seq.length*2, next=[];
      seq.forEach((s,i)=>{ const comp=m+1-s; if(i%2===0){next.push(s,comp);} else {next.push(comp,s);} });
      seq=next;
    }
    return seq; // pozícia -> seed
  },
  nextPow2(q){ let n=2; while(n<q) n*=2; return n; },
  // Pavúk s bye: qualifiers v poradí nasadenia (najlepší prvý), N=mocnina2
  bracketWithByes(qualifiers, N){
    const Q=qualifiers.length, order=this.seedKO(N);
    return order.map(s => s<=Q ? qualifiers[s-1] : {bye:true});
  },
  // Round Robin: rozlosovanie každý s každým (berger tables, jednoduchá verzia)
  roundRobin(players){
    const ps=[...players]; if(ps.length%2) ps.push({bye:true});
    const n=ps.length, rounds=[];
    for(let r=0;r<n-1;r++){
      const games=[];
      for(let i=0;i<n/2;i++){
        const a=ps[i], b=ps[n-1-i];
        if(!a.bye && !b.bye) games.push([a,b]);
      }
      rounds.push(games);
      ps.splice(1,0,ps.pop()); // rotácia
    }
    return rounds;
  },
  // Kód kola pre SKO winner-vetvu: A0, A1, ... , FIN
  roundCode(rIdx, total){ return rIdx===total-1 ? 'FIN' : 'A'+rIdx; },
  roundName(rIdx, total){
    const fromEnd=total-1-rIdx;
    if(fromEnd===0) return 'Finále';
    if(fromEnd===1) return 'Semifinále';
    if(fromEnd===2) return 'Štvrťfinále';
    if(fromEnd===3) return 'Osemfinále';
    return `${rIdx+1}. kolo`;
  },
  matchSig(m){ const s=p=>p?(p.bye?'b':(p.seed??'?')):'_'; return `${s(m.p1)}|${s(m.p2)}`; },
  // Postav Single KO pavúk (zoznam kôl so zápasmi)
  buildSKO(players){
    const seeded=players.map((p,i)=>({name:p.name, seed:i+1}));
    const N=this.nextPow2(Math.max(2,seeded.length));
    const slots=this.bracketWithByes(seeded,N);
    const total=Math.log2(N);
    const rounds=[];
    // round 0
    const r0=[];
    for(let i=0;i<N;i+=2){
      r0.push({ key:`${this.roundCode(0,total)}/${i/2+1}`, p1:slots[i], p2:slots[i+1], s1:null,s2:null, winner:null, resultSig:null });
    }
    rounds.push(r0);
    let cnt=N/2, r=1;
    while(cnt>1){ cnt/=2; const round=[];
      for(let i=0;i<cnt;i++) round.push({ key:`${this.roundCode(r,total)}/${i+1}`, p1:null,p2:null,s1:null,s2:null,winner:null,resultSig:null });
      rounds.push(round); r++;
    }
    const bracket={ type:'sko', N, total, rounds };
    this.recomputeSKO(bracket);
    return bracket;
  },
  recomputeSKO(bracket){
    const R=bracket.rounds;
    for(let r=0;r<R.length;r++){
      R[r].forEach((m,i)=>{
        // ak sa zmenili účastníci od zadania výsledku -> zruš výsledok
        if(m.resultSig && m.resultSig!==this.matchSig(m)){ m.winner=null; m.s1=null; m.s2=null; m.resultSig=null; }
        // auto bye (len 1. kolo)
        if(r===0){
          if(m.p1&&m.p1.bye&&m.p2&&!m.p2.bye) m.winner=2;
          else if(m.p2&&m.p2.bye&&m.p1&&!m.p1.bye) m.winner=1;
        }
        // posuň víťaza do ďalšieho kola
        if(r+1<R.length){
          const t=R[r+1][Math.floor(i/2)], slot=(i%2===0)?'p1':'p2';
          t[slot]= m.winner ? (m.winner===1?m.p1:m.p2) : null;
        }
      });
    }
  },
  champion(bracket){ const last=bracket.rounds[bracket.rounds.length-1][0]; return last && last.winner ? (last.winner===1?last.p1:last.p2) : null; },

  // ── DOUBLE KO (16, "skrátené od 4") — vetvy konvergujú v semifinále ──
  mkMatch(key,p1,p2){ return {key, p1:p1||null, p2:p2||null, s1:null,s2:null,winner:null,resultSig:null}; },
  buildDKO(players){
    const seeded=players.map((p,i)=>({name:p.name,seed:i+1}));
    const N=16;
    const slots=this.bracketWithByes(seeded,N);
    const W=[
      Array.from({length:8},(_,i)=>this.mkMatch(`A0/${i+1}`,slots[2*i],slots[2*i+1])), // 16->8
      Array.from({length:4},(_,i)=>this.mkMatch(`A1/${i+1}`)),                          // 8->4
      Array.from({length:2},(_,i)=>this.mkMatch(`A2/${i+1}`)),                          // 4->2 (postup do SF)
    ];
    const L=[
      Array.from({length:4},(_,i)=>this.mkMatch(`B1a/${i+1}`)), // A0 porazení
      Array.from({length:4},(_,i)=>this.mkMatch(`B1b/${i+1}`)), // B1a víťazi + A1 porazení
      Array.from({length:2},(_,i)=>this.mkMatch(`B2a/${i+1}`)), // B1b víťazi
      Array.from({length:2},(_,i)=>this.mkMatch(`B2b/${i+1}`)), // B2a víťazi + A2 porazení (postup do SF)
    ];
    const SF=[this.mkMatch('SF/1'), this.mkMatch('SF/2')]; // A2 víťaz × B2b víťaz (krížom)
    const FIN=[this.mkMatch('FIN/1')];                     // 1./2.
    const P3=[this.mkMatch('P3/1')];                       // o 3. miesto
    const dko={type:'dko',N,W,L,SF,FIN,P3};
    this.recomputeDKO(dko);
    return dko;
  },
  recomputeDKO(dko){
    const {W,L,SF,FIN,P3}=dko;
    const inval=m=>{ if(m.resultSig && m.resultSig!==this.matchSig(m)){ m.winner=null;m.s1=null;m.s2=null;m.resultSig=null; } };
    const autob=m=>{ if(m.p1&&m.p1.bye&&m.p2&&!m.p2.bye) m.winner=2; else if(m.p2&&m.p2.bye&&m.p1&&!m.p1.bye) m.winner=1; };
    const wOf=m=> m.winner? (m.winner===1?m.p1:m.p2) : null;
    const lOf=m=> m.winner? (m.winner===1?m.p2:m.p1) : null;
    // WINNER vetva
    W[0].forEach(m=>{ inval(m); autob(m); });
    W[1].forEach((m,i)=>{ m.p1=wOf(W[0][2*i]); m.p2=wOf(W[0][2*i+1]); }); W[1].forEach(inval);
    W[2].forEach((m,i)=>{ m.p1=wOf(W[1][2*i]); m.p2=wOf(W[1][2*i+1]); }); W[2].forEach(inval);
    // LOSER vetva
    L[0].forEach((m,i)=>{ m.p1=lOf(W[0][2*i]); m.p2=lOf(W[0][2*i+1]); }); L[0].forEach(m=>{ inval(m); autob(m); });
    const A1toB1b={0:2,1:3,2:0,3:1}; // A1/1→B,/2→A,/3→D,/4→C ; B1b poradie D,C,B,A
    L[1].forEach((m,i)=>{ m.p1=wOf(L[0][i]); m.p2=null; });
    W[1].forEach((m,i)=>{ L[1][A1toB1b[i]].p2=lOf(m); });
    L[1].forEach(m=>{ inval(m); autob(m); });
    L[2].forEach((m,i)=>{ m.p1=wOf(L[1][2*i]); m.p2=wOf(L[1][2*i+1]); }); L[2].forEach(inval);
    const A2toB2b={0:0,1:1}; // A2/1→F, A2/2→E
    L[3].forEach((m,i)=>{ m.p1=wOf(L[2][i]); m.p2=null; });
    W[2].forEach((m,i)=>{ L[3][A2toB2b[i]].p2=lOf(m); });
    L[3].forEach(inval);
    // SEMIFINÁLE — víťaz A2 × víťaz B2b (krížom, aby sa nestretli tí istí)
    SF[0].p1=wOf(W[2][0]); SF[0].p2=wOf(L[3][1]); // A2/1 víťaz vs B2b/2 víťaz
    SF[1].p1=wOf(W[2][1]); SF[1].p2=wOf(L[3][0]); // A2/2 víťaz vs B2b/1 víťaz
    SF.forEach(inval);
    // FINÁLE (1./2.)
    FIN[0].p1=wOf(SF[0]); FIN[0].p2=wOf(SF[1]); inval(FIN[0]);
    // O 3. MIESTO (porazení zo SF)
    P3[0].p1=lOf(SF[0]); P3[0].p2=lOf(SF[1]); inval(P3[0]);
  },
  dkoStandings(dko){
    const wOf=m=> m.winner? (m.winner===1?m.p1:m.p2) : null;
    const lOf=m=> m.winner? (m.winner===1?m.p2:m.p1) : null;
    const fin=dko.FIN[0], p3=dko.P3[0];
    return { first:wOf(fin), second:lOf(fin), third:wOf(p3), fourth:lOf(p3) };
  },
  // Zdieľaný rebríček: primárne výhry, potom fáza, rozdiel hier, %
  rankFrom(list){ // list: [{m, phase}]
    const stat={};
    const ensure=p=>{ if(p&&!p.bye&&!stat[p.name]) stat[p.name]={name:p.name,seed:p.seed,wins:0,losses:0,gw:0,gl:0,exit:0}; };
    const wOf=m=> m.winner? (m.winner===1?m.p1:m.p2) : null;
    const lOf=m=> m.winner? (m.winner===1?m.p2:m.p1) : null;
    list.forEach(({m,phase})=>{
      [m.p1,m.p2].forEach(ensure);
      if(m.winner && m.p1&&m.p2 && !m.p1.bye && !m.p2.bye){
        const w=wOf(m), l=lOf(m), s1=m.s1||0, s2=m.s2||0, wg=Math.max(s1,s2), lg=Math.min(s1,s2);
        stat[w.name].wins++; stat[w.name].gw+=wg; stat[w.name].gl+=lg;
        stat[l.name].losses++; stat[l.name].gw+=lg; stat[l.name].gl+=wg;
        stat[w.name].exit=Math.max(stat[w.name].exit,phase);
        stat[l.name].exit=Math.max(stat[l.name].exit,phase);
      }
    });
    const arr=Object.values(stat).map(s=>({...s, gp:s.wins+s.losses, pct:(s.gw+s.gl)?Math.round(100*s.gw/(s.gw+s.gl)):0}));
    arr.sort((a,b)=> b.wins-a.wins || b.exit-a.exit || (b.gw-b.gl)-(a.gw-a.gl) || b.pct-a.pct || a.seed-b.seed);
    let place=0, prev=null, idx=0;
    arr.forEach(s=>{ idx++; const k=`${s.wins}|${s.exit}`; if(k!==prev){ place=idx; prev=k; } s.place=place; });
    return arr;
  },
  dkoRanking(dko){
    const EXIT={A0:1,B1a:1,A1:2,B1b:2,A2:3,B2a:3,B2b:4,SF:5,P3:6,FIN:7};
    const roundOf=k=>k.split('/')[0];
    const list=[...dko.W.flat(), ...dko.L.flat(), ...dko.SF, ...dko.FIN, ...dko.P3].map(m=>({m, phase:EXIT[roundOf(m.key)]||0}));
    return this.rankFrom(list);
  },
  skoRanking(br){
    const list=[];
    br.rounds.forEach((round,ri)=>round.forEach(m=>list.push({m, phase:ri+1})));
    return this.rankFrom(list);
  }
};

/* ── DETAIL TURNAJA ── */
let curT=null; // aktuálne otvorený turnaj (objekt v store)

function ensureBracket(t){
  const players=Array.isArray(t.players)?t.players:[];
  if(t.format==='sko'){
    if(!t.bracket || t.bracket.type!=='sko' || !t.bracket.rounds) t.bracket=TM.buildSKO(players);
    else TM.recomputeSKO(t.bracket);
  } else if(t.format==='dko'){
    if(!t.dko || t.dko.type!=='dko' || !t.dko.W) t.dko=TM.buildDKO(players);
    else TM.recomputeDKO(t.dko);
  } else if(t.format==='rr'){
    if(!t.rr || !t.rr.matches || !t.rr.matches.length){
      const seeded=players.map((p,i)=>({name:p.name,seed:i+1}));
      const rounds=TM.roundRobin(seeded);
      t.rr={ matches:[] };
      rounds.forEach((round,ri)=>round.forEach((g,gi)=>{
        t.rr.matches.push({ key:`R${ri+1}/${gi+1}`, round:ri+1, p1:g[0], p2:g[1], s1:null,s2:null,winner:null });
      }));
    }
  } else if(t.format==='rr_sko' || t.format==='rr_dko'){
    if(!t.grp || !t.grp.groups || !t.grp.groups.length){
      const G=Math.max(1, t.groups||2);
      const seeded=players.map((p,i)=>({name:p.name,seed:i+1}));
      const groups=Array.from({length:G},(_,gi)=>({name:String.fromCharCode(65+gi), players:[], matches:[]}));
      seeded.forEach((p,i)=>groups[i%G].players.push(p)); // rozdelenie: seedy krížom do skupín
      groups.forEach(g=>{
        const rounds=TM.roundRobin(g.players);
        rounds.forEach((round,ri)=>round.forEach((game,mi)=>{
          g.matches.push({ key:`${g.name}${ri+1}/${mi+1}`, round:ri+1, p1:game[0], p2:game[1], s1:null,s2:null,winner:null });
        }));
      });
      t.grp={ groups, advance:t.advance };
    }
  }
}
function persistT(){ const ts=loadTournaments().map(x=>x.id===curT.id?curT:x); saveTournaments(ts); }

          </div>

function editTournament(id){ const t=loadTournaments().find(x=>x.id===id); if(t) go('wizard', t); }

/* ── Render zoznamu zápasov ── */
function renderMatchArea(t){
  if(t.format==='sko'){
    const br=t.bracket; if(!br) return '';
    const champ=TM.champion(br);
    let html='';
    if(champ) html+=`<div class="champ-banner">🏆 Víťaz turnaja: <b>${champ.name}</b></div>`;
    br.rounds.forEach((round,ri)=>{
      html+=`<div class="round-block"><div class="round-head"><span class="round-name">${TM.roundName(ri,br.total)}</span><span class="round-code mono">${TM.roundCode(ri,br.total)}</span></div>`;
      round.forEach((m,mi)=>{ html+=matchRow(m,`sko:${ri}:${mi}`); });
      html+=`</div>`;
    });
    const rank=TM.skoRanking(br);
    if(rank.some(r=>r.gp>0)) html+=renderRankTable(rank);
    return html;
  }
  else if(t.format==='dko'){
    const dko=t.dko; if(!dko) return '';
    const rank=TM.dkoRanking(dko);
    const played=rank.some(r=>r.gp>0);
    let html='';
    const sect=(title,cls,rounds,names,prefix)=>{
      let h=`<div class="branch-label ${cls}">${title}</div>`;
      rounds.forEach((round,ri)=>{
        h+=`<div class="round-block"><div class="round-head"><span class="round-name">${names[ri]}</span></div>`;
        round.forEach((m,mi)=>{ h+=matchRow(m,`${prefix}:${ri}:${mi}`); });
        h+=`</div>`;
      });
      return h;
    };
    html+=sect('▲ Winner vetva (A)','win',dko.W,['A0 · 1. kolo','A1 · osemfinále','A2 · štvrťfinále'],'W');
    html+=sect('▼ Loser vetva (B)','lose',dko.L,['B1a · loser 1','B1b · loser 2','B2a · loser 3','B2b · loser 4'],'L');
    html+=sect('◆ Finálová časť (vetvy sa spájajú)','conv',[dko.SF,dko.FIN,dko.P3],['Semifinále — víťazi A2 × víťazi B2b','Finále (1./2.)','O 3. miesto'],'F');
    html+=`<div class="note-box" style="margin-top:14px">Celkové poradie: primárne <b>počet výhier</b>, potom fáza vypadnutia, rozdiel hier a %. Delené miesta (3.–3., 5.–5.…) ako v cuescores. Pripravené na uloženie do štatistík.</div>`;
    if(played) html+=renderRankTable(rank);
    return html;
  }
  else if(t.format==='rr'){
    const rr=t.rr; if(!rr||!rr.matches.length) return `<div class="note-box">Žiadne zápasy — potrebuješ aspoň 2 hráčov.</div>`;
    // tabuľka: výhry/prehry/hry/body/%
    const tab={};
    (Array.isArray(t.players)?t.players:[]).forEach((p,i)=>tab[p.name]={name:p.name,seed:i+1,w:0,l:0,gw:0,gl:0,p:0});
    rr.matches.forEach(m=>{ if(m.winner){ const win=m.winner===1?m.p1:m.p2, lose=m.winner===1?m.p2:m.p1;
      const s1=m.s1||0,s2=m.s2||0, wgw=Math.max(s1,s2), lgw=Math.min(s1,s2);
      if(tab[win.name]){tab[win.name].w++;tab[win.name].p+=2;tab[win.name].gw+=wgw;tab[win.name].gl+=lgw;}
      if(tab[lose.name]){tab[lose.name].l++;tab[lose.name].gw+=lgw;tab[lose.name].gl+=wgw;} }});
    const standings=Object.values(tab).map(s=>({...s,pct:(s.gw+s.gl)?Math.round(100*s.gw/(s.gw+s.gl)):0}))
      .sort((a,b)=>b.p-a.p||b.w-a.w||(b.gw-b.gl)-(a.gw-a.gl)||a.seed-b.seed);
    let html=`<div class="branch-label conv" style="margin-top:0">Výsledková tabuľka</div>
      <div class="standings"><div class="st-head2"><span>#</span><span>Hráč</span><span>V</span><span>P</span><span>Hry</span><span>%</span><span>Body</span></div>`;
    standings.forEach((s,i)=>html+=`<div class="st-row2"><span class="mono">${i+1}</span><span>${s.name}</span><span>${s.w}</span><span>${s.l}</span><span class="mono" style="color:var(--muted)">${s.gw}:${s.gl}</span><span class="mono">${s.pct}%</span><span class="mono" style="color:var(--gold)">${s.p}</span></div>`);
    html+=`</div>`;
    html+=`<div class="branch-label win" style="margin-top:18px">Zoznam zápasov</div>`;
    let lastRound=0;
    rr.matches.forEach((m,mi)=>{ if(m.round!==lastRound){ html+=`<div class="rr-round-label mono">Kolo ${m.round}</div>`; lastRound=m.round; } html+=matchRow(m,`rr:${mi}`); });
    return html;
  }
  else {
    // rr_sko / rr_dko — skupinová fáza
    const grp=t.grp; if(!grp||!grp.groups) return `<div class="note-box">Skupiny sa nepodarilo vytvoriť.</div>`;
    const koType=t.format==='rr_dko'?'Double KO':'Single KO';
    let html=`<div class="note-box" style="margin-bottom:16px">${grp.groups.length} skupín · z každej postupuje ${grp.advance} → následne ${koType} pavúk (krížové nasadenie). Najprv dohraj skupiny.</div>`;
    grp.groups.forEach((g,gi)=>{
      const st=rrTable(g.players, g.matches);
      const adv=Math.min(grp.advance, g.players.length);
      html+=`<div class="branch-label conv" style="margin-top:0">Skupina ${g.name} · ${g.players.length} hráčov</div>`;
      html+=`<div class="standings"><div class="st-head2"><span>#</span><span>Hráč</span><span>V</span><span>P</span><span>Hry</span><span>%</span><span>Body</span></div>`;
      st.forEach((s,i)=>html+=`<div class="st-row2 ${i<adv?'adv':''}"><span class="mono">${i+1}</span><span>${s.name}${i<adv?' <span class="adv-tag">postup</span>':''}</span><span>${s.w}</span><span>${s.l}</span><span class="mono" style="color:var(--muted)">${s.gw}:${s.gl}</span><span class="mono">${s.pct}%</span><span class="mono" style="color:var(--gold)">${s.p}</span></div>`);
      html+=`</div>`;
      html+=`<div class="rr-round-label mono" style="margin-top:10px">Zápasy skupiny ${g.name}</div>`;
      let lastRound=0;
      g.matches.forEach((m,mi)=>{ if(m.round!==lastRound){ html+=`<div class="rr-round-label mono">Kolo ${m.round}</div>`; lastRound=m.round; } html+=matchRow(m,`grp:${gi}:${mi}`); });
    });
    const allDone=grp.groups.every(g=>g.matches.every(m=>m.winner!=null));
    html+=`<div class="note-box" style="margin-top:16px">${allDone?'✓ Skupiny dohrané — ':''}Po dohraní skupín sa postupujúci nasadia krížom do ${koType} pavúka (A1 vs B3…). Generovanie pavúka finalizujeme ako ďalší krok.</div>`;
    return html;
  }
}

/* Pomocná: kompletný rebríček (celkové poradie) */
function renderRankTable(rank){
  let html=`<div class="final-standings" style="margin-top:18px"><div class="fs-title">Celkové poradie · rozhodujú výhry</div>
    <div class="rank-head"><span>#</span><span>Hráč</span><span>Zápasy</span><span>Hry</span><span>%</span></div>`;
  rank.forEach(s=>{
    const medal = s.place===1?'🥇':s.place===2?'🥈':s.place===3?'🥉':'';
    const top = s.place<=3 ? `top top${s.place}` : '';
    html+=`<div class="rank-row ${top}"><span class="rank-pl mono">${medal||s.place+'.'}</span>
      <span class="rank-name">${s.name}</span>
      <span class="mono">${s.wins}/${s.losses}</span>
      <span class="mono rank-games">${s.gw}:${s.gl}</span>
      <span class="mono rank-pct">${s.pct}%</span></div>`;
  });
  return html+`</div>`;
}

/* Pomocná: tabuľka skupiny/RR z hráčov + zápasov */
function rrTable(players, matches){
  const tab={};
  players.forEach((p,i)=>tab[p.name]={name:p.name,seed:p.seed||i+1,w:0,l:0,gw:0,gl:0,p:0});
  matches.forEach(m=>{ if(m.winner){ const win=m.winner===1?m.p1:m.p2, lose=m.winner===1?m.p2:m.p1;
    const s1=m.s1||0,s2=m.s2||0, wgw=Math.max(s1,s2), lgw=Math.min(s1,s2);
    if(tab[win.name]){tab[win.name].w++;tab[win.name].p+=2;tab[win.name].gw+=wgw;tab[win.name].gl+=lgw;}
    if(tab[lose.name]){tab[lose.name].l++;tab[lose.name].gw+=lgw;tab[lose.name].gl+=wgw;} }});
  return Object.values(tab).map(s=>({...s,pct:(s.gw+s.gl)?Math.round(100*s.gw/(s.gw+s.gl)):0}))
    .sort((a,b)=>b.p-a.p||b.w-a.w||(b.gw-b.gl)-(a.gw-a.gl)||a.seed-b.seed);
}

function matchRow(m, loc){
  const bye = (m.p1&&m.p1.bye)||(m.p2&&m.p2.bye);
  const name=(p)=> p? (p.bye?'<span class="mt-bye">(bye)</span>':p.name) : '<span class="mt-wait">čaká na postup</span>';
  const done = m.winner!=null && !bye;
  const w1=m.winner===1, w2=m.winner===2;
  const score = done ? `<span class="mt-score mono">${m.s1??'–'}:${m.s2??'–'}</span>` : (bye?`<span class="mt-bye">postup</span>`:`<span class="mt-vs">vs</span>`);
  const clickable = !bye && m.p1 && m.p2 && !(m.p1.bye)&&!(m.p2.bye);
  return `<div class="match-row ${done?'done':''} ${clickable?'clickable':''}" ${clickable?`onclick="openMatch('${loc}')"`:''}>
    <span class="mt-key mono">${m.key}</span>
    <span class="mt-side ${w1?'win':''}">${name(m.p1)}</span>
    ${score}
    <span class="mt-side right ${w2?'win':''}">${name(m.p2)}</span>
    ${done?'<span class="mt-check">✓</span>':(clickable?'<span class="mt-edit">›</span>':'')}
  </div>`;
}

/* ── Zadanie výsledku (loc-based) ── */
let editLoc=null;
function getMatchByLoc(loc){
  const [k,a,b]=loc.split(':');
  if(k==='rr') return curT.rr.matches[+a];
  if(k==='sko') return curT.bracket.rounds[+a][+b];
  if(k==='W') return curT.dko.W[+a][+b];
  if(k==='L') return curT.dko.L[+a][+b];
  if(k==='F'){ const arr=[curT.dko.SF,curT.dko.FIN,curT.dko.P3][+a]; return arr[+b]; }
  if(k==='grp') return curT.grp.groups[+a].matches[+b];
  return null;
}
function recomputeFor(loc){
  const k=loc.split(':')[0];
  if(k==='sko') TM.recomputeSKO(curT.bracket);
  else if(k==='W'||k==='L'||k==='F') TM.recomputeDKO(curT.dko);
  // rr, grp: bez posunu (tabuľka sa prepočíta pri renderi)
}
function openMatch(loc){
  const m=getMatchByLoc(loc);
  if(!m || !m.p1 || !m.p2 || m.p1.bye || m.p2.bye) return;
  editLoc=loc;
  document.getElementById('matchModalArea').innerHTML=`
    <div class="overlay" onclick="closeMatch(event)">
      <div class="match-modal" onclick="event.stopPropagation()">
        <div class="mm-key mono">${m.key}</div>
        <div class="mm-players">
          <div class="mm-p"><div class="mm-name">${m.p1.name}</div><input type="number" id="mmS1" min="0" value="${m.s1??''}" placeholder="0"/></div>
          <div class="mm-x">:</div>
          <div class="mm-p"><div class="mm-name">${m.p2.name}</div><input type="number" id="mmS2" min="0" value="${m.s2??''}" placeholder="0"/></div>
        </div>
        <div class="mm-quick">
          <button onclick="quickWin(1)">Vyhral ${m.p1.name.split(' ')[0]}</button>
          <button onclick="quickWin(2)">Vyhral ${m.p2.name.split(' ')[0]}</button>
        </div>
        <div class="mm-actions">
          ${m.winner?`<button class="btn btn-ghost btn-danger" onclick="clearMatch()">Vymazať výsledok</button>`:'<span></span>'}
          <button class="btn btn-green" onclick="saveMatch()">Uložiť výsledok</button>
        </div>
      </div>
    </div>`;
  setTimeout(()=>{const e=document.getElementById('mmS1'); if(e) e.focus();},40);
}
function closeMatch(e){ if(e&&e.target&&!e.target.classList.contains('overlay')) return; document.getElementById('matchModalArea').innerHTML=''; editLoc=null; }
function quickWin(side){
  const a=document.getElementById('mmS1'), b=document.getElementById('mmS2');
  if(side===1){ a.value=Math.max(1,+a.value||1); b.value=Math.min(+a.value-1,+b.value||0);} 
  else { b.value=Math.max(1,+b.value||1); a.value=Math.min(+b.value-1,+a.value||0);} 
}
function saveMatch(){
  const m=getMatchByLoc(editLoc);
  const s1=+document.getElementById('mmS1').value, s2=+document.getElementById('mmS2').value;
  if(isNaN(s1)||isNaN(s2)){ toast('Zadaj skóre oboch hráčov.',true); return; }
  if(s1===s2){ toast('Skóre nemôže byť nerozhodné — určí víťaza.',true); return; }
  m.s1=s1; m.s2=s2; m.winner=s1>s2?1:2; m.resultSig=TM.matchSig(m);
  recomputeFor(editLoc); persistT(); closeMatch();
  document.getElementById('matchArea').innerHTML=renderMatchArea(curT);
  toast('Výsledok uložený ✓');
}
function clearMatch(){
  const m=getMatchByLoc(editLoc); m.s1=null;m.s2=null;m.winner=null;m.resultSig=null;
  recomputeFor(editLoc); persistT(); closeMatch();
  document.getElementById('matchArea').innerHTML=renderMatchArea(curT);
  toast('Výsledok vymazaný');
}


/* ════════════════════════════════════════════════════════════
   WIZARD — nastavenie turnaja
════════════════════════════════════════════════════════════ */
const SPORTS=['Biliard','Šípky','Bowling','Tenis','Stolný tenis','Padel','Šach','Bedminton','Karty'];
const DISCIPLINES={
  'Biliard':['8-ball','9-ball','10-ball','Snooker','Karambol','Pyramída','14.1 nekonečná'],
  'Šípky':['501','301','Cricket'],
  'Bowling':['Klasik'],
  'Tenis':['Dvojhra','Štvorhra'],
  'Stolný tenis':['Dvojhra','Štvorhra'],
  'Padel':['Štvorhra'],
  'Šach':['Klasik','Rapid','Blitz'],
  'Bedminton':['Dvojhra','Štvorhra'],
  'Karty':['Mariáš','Žolíky','Rummy','Bridge','Kanasta'],
};
const FORMATS={
  rr:{ic:'🔄',t:'Round Robin',d:'Každý s každým. Konečné poradie podľa tabuľky.',struct:['Skupina / liga']},
  sko:{ic:'🎯',t:'Single KO',d:'Vyraďovací pavúk — jedna prehra a koniec.',struct:['Pavúk']},
  dko:{ic:'🔁',t:'Double KO',d:'Pavúk s vetvou porazených (víťazná A + loser B vetva).',struct:['Pavúk A+B']},
  rr_sko:{ic:'🏆',t:'Skupiny → Single KO',d:'Najprv skupiny (RR), postupujúci do Single KO pavúka.',struct:['Skupiny','Single KO']},
  rr_dko:{ic:'🏆',t:'Skupiny → Double KO',d:'Najprv skupiny (RR), postupujúci do Double KO pavúka.',struct:['Skupiny','Double KO']},
};
const STEPS=[['Info','📋'],['Formát','🏆'],['Hráči','👥'],['Skupiny','🔢'],['Súhrn','✓']];

let wiz={};
function blankWiz(){ return {step:0, name:'', sport:'Biliard', discipline:'8-ball', date:'', venue:'', format:'sko', players:[], groups:2, advance:8, showBulk:false, editId:null}; }
function isCombo(){ return wiz.format==='rr_sko'||wiz.format==='rr_dko'; }
function isKarty(){ return wiz.sport==='Karty'; }
function activeSteps(){ return isKarty()? [0,2,4] : (isCombo()? [0,1,2,3,4] : [0,1,2,4]); }

function viewWizard(){
  return `<div class="wrap"><div class="wiz">
    <div class="wiz-rail" id="wizRail"></div>
    <div class="wiz-panel" id="wizPanel"></div>
  </div></div>`;
}
function initWizard(existing){
  wiz=blankWiz();
  if(existing){ // editácia
    wiz={...wiz, ...existing, players:Array.isArray(existing.players)?existing.players.map(p=>({...p})):[], editId:existing.id, step:0, showBulk:false};
  }
  renderWiz();
}

function renderRail(){
  const steps=activeSteps(), cur=steps.indexOf(wiz.step);
  document.getElementById('wizRail').innerHTML=
    `<div class="rail-title">Nový turnaj</div>`+
    steps.map((s,idx)=>{
      const cls = wiz.step===s?'active':(idx<cur?'done':'');
      return `<div class="rail-step ${cls}" onclick="gotoStep(${s})"><span class="num">${idx<cur?'✓':idx+1}</span><span class="lbl">${STEPS[s][0]}</span></div>`;
    }).join('');
}
function gotoStep(s){ const steps=activeSteps(); if(steps.indexOf(s)<=steps.indexOf(wiz.step)){ wiz.step=s; renderWiz(); } }
function nextStep(){ const steps=activeSteps(), i=steps.indexOf(wiz.step); if(i<steps.length-1){ wiz.step=steps[i+1]; renderWiz(); } }
function prevStep(){ const steps=activeSteps(), i=steps.indexOf(wiz.step); if(i>0){ wiz.step=steps[i-1]; renderWiz(); } }

function renderWiz(){
  renderRail();
  const p=document.getElementById('wizPanel');
  if(wiz.step===0){
    const discs=DISCIPLINES[wiz.sport]||[];
    if(!discs.includes(wiz.discipline)) wiz.discipline=discs[0];
    p.innerHTML=`
      <h2>Základné info</h2><div class="sub">Pomenuj turnaj, vyber šport a disciplínu.</div>
      <div class="field"><label>Názov turnaja</label><input id="wName" value="${wiz.name}" placeholder="napr. Letný pool open 2026"/></div>
      <div class="field"><label>Šport</label>
        <select id="wSport" onchange="wiz.sport=this.value;wiz.discipline=(DISCIPLINES[this.value]||[])[0];if(wiz.sport==='Karty')wiz.format='karty';renderWiz()">
          ${SPORTS.map(s=>`<option ${s===wiz.sport?'selected':''}>${s}</option>`).join('')}
        </select></div>
      <div class="field"><label>Disciplína</label>
        <div class="pill-row">${discs.map(d=>`<button class="pill ${d===wiz.discipline?'sel':''}" onclick="wiz.discipline='${d}';renderWiz()">${d}</button>`).join('')}</div></div>
      <div class="row2">
        <div class="field"><label>Dátum</label><input type="date" id="wDate" value="${wiz.date}" onchange="wiz.date=this.value"/></div>
        <div class="field"><label>Miesto (nepovinné)</label><input id="wVenue" value="${wiz.venue}" placeholder="napr. ŠK Pohoda" oninput="wiz.venue=this.value"/></div>
      </div>
      <div class="wiz-nav"><button class="btn btn-ghost" onclick="go('dashboard')">Zrušiť</button><button class="btn btn-primary" onclick="saveInfo()">Ďalej →</button></div>`;
  }
  else if(wiz.step===1){
    const card=(k)=>{const f=FORMATS[k]; return `<div class="fmt-card ${wiz.format===k?'sel':''}" onclick="wiz.format='${k}';renderWiz()">
      <div class="fic">${f.ic}</div>
      <div class="ftxt"><div class="ft">${f.t}</div><div class="fd">${f.d}</div>
        <div class="fstruct">${f.struct.map((s,i)=>`${i>0?'<span class="arr">→</span>':''}<span class="ph">${s}</span>`).join('')}</div></div></div>`;};
    p.innerHTML=`
      <h2>Formát súťaže</h2><div class="sub">Jedna fáza, alebo kombinácia skupín a vyraďováka.</div>
      <div class="fmt-section">Jedna fáza</div>
      <div class="fmt-list">${card('rr')}${card('sko')}${card('dko')}</div>
      <div class="fmt-section">Kombinácia — skupiny → vyraďovák</div>
      <div class="fmt-list">${card('rr_sko')}${card('rr_dko')}</div>
      <div class="wiz-nav"><button class="btn btn-ghost" onclick="prevStep()">← Späť</button><button class="btn btn-primary" onclick="nextStep()">Ďalej →</button></div>`;
  }
  else if(wiz.step===2){
    const N=TM.nextPow2(Math.max(2,wiz.players.length));
    p.innerHTML=`
      <h2>Hráči</h2><div class="sub">Pridaj hráčov jednotlivo, alebo hromadne vlož celý zoznam.</div>
      <div class="player-add">
        <input id="wPlayerName" placeholder="Meno a priezvisko hráča" onkeydown="if(event.key==='Enter')addPlayer()"/>
        <button class="btn btn-primary" onclick="addPlayer()">＋ Pridať</button></div>
      <span class="bulk-toggle" onclick="wiz.showBulk=!wiz.showBulk;renderWiz()">${wiz.showBulk?'− Skryť hromadné pridanie':'＋ Hromadné pridanie (vložiť zoznam)'}</span>
      ${wiz.showBulk?`<div class="bulk-box">
        <textarea id="wBulk" placeholder="Ján Novák&#10;Peter Horváth&#10;Mária Kováčová&#10;…"></textarea>
        <button class="btn btn-ghost" style="margin-top:8px" onclick="addBulk()">Pridať všetkých zo zoznamu</button></div>`:''}
      <div class="player-stats">
        <span class="player-count"><b>${wiz.players.length}</b> hráčov</span>
        ${wiz.players.length?`<span class="player-bracket">${wiz.players.length>=2?`pavúk ${N}${N>wiz.players.length?` · ${N-wiz.players.length} bye`:''} · `:''}<button class="clear-all" onclick="clearPlayers()">vymazať všetkých</button></span>`:''}
      </div>
      ${wiz.players.length? `<div class="player-list">${wiz.players.map((pl,i)=>`<div class="pl-item"><span class="pl-seed">${i+1}</span><span class="pl-name">${pl.name}</span><button class="pl-del" onclick="removePlayer(${i})">✕</button></div>`).join('')}</div>`
        : `<div class="player-empty">Zatiaľ žiadni hráči. Pridaj prvého vyššie.</div>`}
      <div class="wiz-nav"><button class="btn btn-ghost" onclick="prevStep()">← Späť</button><button class="btn btn-primary" onclick="nextStep()">Ďalej →</button></div>`;
    setTimeout(()=>{const e=document.getElementById('wPlayerName'); if(e&&!wiz.showBulk) e.focus();},30);
  }
  else if(wiz.step===3){
    const perGroup=Math.ceil(wiz.players.length/Math.max(1,wiz.groups));
    p.innerHTML=`
      <h2>Skupiny a postup</h2><div class="sub">Rozdelenie ${wiz.players.length} hráčov do skupín a koľko postupuje do pavúka.</div>
      <div class="row2">
        <div class="field"><label>Počet skupín</label><input type="number" id="wGroups" min="1" max="64" value="${wiz.groups}" oninput="wiz.groups=Math.max(1,+this.value);refreshGroupNote()"/>
          <div class="hint">≈ ${perGroup} hráčov na skupinu</div></div>
        <div class="field"><label>Postupuje z každej</label><input type="number" id="wAdvance" min="1" max="32" value="${wiz.advance}" oninput="wiz.advance=Math.max(1,+this.value);refreshGroupNote()"/></div>
      </div>
      <div class="note-box" id="groupNote"></div>
      <div class="wiz-nav"><button class="btn btn-ghost" onclick="prevStep()">← Späť</button><button class="btn btn-primary" onclick="nextStep()">Ďalej →</button></div>`;
    refreshGroupNote();
  }
  else if(wiz.step===4){
    const f=FORMATS[wiz.format];
    p.innerHTML=`
      <h2>Súhrn a generovanie</h2><div class="sub">${isKarty()?'Skontroluj a vytvor turnaj — otvoríme Generátor stolov.':'Skontroluj a vytvor turnaj — vygenerujeme prvé kolo.'}</div>
      <div class="sumbox">
        <div class="sumrow"><span class="k">Názov</span><span class="v">${wiz.name||'—'}</span></div>
        <div class="sumrow"><span class="k">Šport · disciplína</span><span class="v">${wiz.sport} · ${wiz.discipline}</span></div>
        <div class="sumrow"><span class="k">Formát</span><span class="v">${isKarty()?'Karty — generátor stolov':f.t}</span></div>
        <div class="sumrow"><span class="k">Hráči</span><span class="v">${wiz.players.length}</span></div>
        ${isCombo()?`<div class="sumrow"><span class="k">Skupiny</span><span class="v">${wiz.groups} × postup ${wiz.advance} = ${wiz.groups*wiz.advance} do KO</span></div>`:''}
        ${wiz.date?`<div class="sumrow"><span class="k">Dátum</span><span class="v">${wiz.date}</span></div>`:''}
      </div>
      <div id="genPreview"></div>
      <div class="wiz-nav"><button class="btn btn-ghost" onclick="prevStep()">← Späť</button><button class="btn btn-green" onclick="createTournament()">${wiz.editId?'✓ Uložiť zmeny':(isKarty()?'✓ Vytvoriť turnaj a otvoriť stoly':'✓ Vytvoriť turnaj')}</button></div>`;
    renderPreview();
  }
}

function saveInfo(){
  wiz.name=document.getElementById('wName').value.trim();
  if(!wiz.name){ toast('Doplň názov turnaja.',true); return; }
  nextStep();
}
function addPlayer(){
  const inp=document.getElementById('wPlayerName'); const name=(inp.value||'').trim();
  if(!name) return; wiz.players.push({name}); inp.value=''; renderWiz();
}
function addBulk(){
  const ta=document.getElementById('wBulk'); if(!ta) return;
  const names=ta.value.split('\n').map(s=>s.trim()).filter(Boolean);
  if(!names.length){ toast('Vlož aspoň jedno meno.',true); return; }
  names.forEach(n=>wiz.players.push({name:n}));
  wiz.showBulk=false; renderWiz(); toast(`Pridaných ${names.length} hráčov`);
}
function removePlayer(i){ wiz.players.splice(i,1); renderWiz(); }
function clearPlayers(){ if(confirm('Vymazať všetkých hráčov?')){ wiz.players=[]; renderWiz(); } }
function refreshGroupNote(){
  const el=document.getElementById('groupNote'); if(!el) return;
  const total=wiz.groups*wiz.advance, N=TM.nextPow2(Math.max(2,total));
  const koType=wiz.format==='rr_dko'?'Double KO':'Single KO';
  el.innerHTML=`Postupujúci spolu: <b>${total}</b> → ${koType} pavúk <b>${N}</b>${N>total?` (${N-total} bye)`:''}.<br>Víťazi skupín idú do opačných polovíc — stretnú sa najskôr vo finále. Krížové nasadenie (A1 vs B3…) finalizujeme v engine.`;
}

function renderPreview(){
  const el=document.getElementById('genPreview');
  const players = wiz.players.length>=2 ? wiz.players.map((p,i)=>({...p,seed:i+1}))
                 : Array.from({length:8},(_,i)=>({name:`Hráč ${i+1}`,seed:i+1}));
  const demoNote = wiz.players.length<2?`<div class="note-box">Pridaj aspoň 2 hráčov — náhľad používa zástupné mená.</div>`:'';
  if(isKarty()){
    el.innerHTML=demoNote+`<div class="note-box"><b>Karty — ${wiz.discipline}:</b> ${wiz.players.length} hráčov. Po vytvorení ťa presmerujeme do Generátora stolov, kde sa rozdelia do stolov a hrajú sa kolá — žiadny pavúk ani tabuľka RR sa tu negeneruje.</div>`;
  }
  else if(wiz.format==='sko'||wiz.format==='dko'){
    const N=TM.nextPow2(players.length), slots=TM.bracketWithByes(players,N);
    let html=`<div class="preview"><h4>${wiz.format==='dko'?'Double KO':'Single KO'} · pavúk ${N} — prvé kolo (A0)</h4>`;
    for(let i=0;i<N;i+=2){
      const a=slots[i], b=slots[i+1], key=`A0/${i/2+1}`;
      if(a.bye||b.bye){ const adv=a.bye?b:a; html+=`<div class="mt-match"><span class="mt-key">${key}</span><span class="mt-p">${adv.name}</span><span class="mt-bye">bye → postupuje</span></div>`; }
      else html+=`<div class="mt-match"><span class="mt-key">${key}</span><span class="mt-p">${a.name}</span><span class="mt-vs">vs</span><span class="mt-p" style="text-align:right">${b.name}</span></div>`;
    }
    html+=`</div>`;
    if(wiz.format==='dko') html+=`<div class="note-box"><b>Double KO:</b> seedovanie A0 hotové. Routing porazených (B-vetva) doťahujeme.</div>`;
    el.innerHTML=demoNote+html;
  }
  else if(wiz.format==='rr'){
    const rounds=TM.roundRobin(players);
    let html=`<div class="preview"><h4>Round Robin — 1. kolo</h4>`;
    rounds[0].forEach((g,i)=>html+=`<div class="mt-match"><span class="mt-key">R1/${i+1}</span><span class="mt-p">${g[0].name}</span><span class="mt-vs">vs</span><span class="mt-p" style="text-align:right">${g[1].name}</span></div>`);
    html+=`</div><div class="note-box">Spolu kôl: <b>${rounds.length}</b>, zápasov: <b>${rounds.reduce((s,r)=>s+r.length,0)}</b>.</div>`;
    el.innerHTML=demoNote+html;
  }
  else {
    const total=wiz.groups*wiz.advance, N=TM.nextPow2(Math.max(2,total)), koType=wiz.format==='rr_dko'?'Double KO':'Single KO';
    el.innerHTML=demoNote+`<div class="note-box"><b>${FORMATS[wiz.format].t}:</b> ${wiz.players.length} hráčov → ${wiz.groups} skupín (RR). Z každej postupuje ${wiz.advance} → ${total} do ${koType} pavúka ${N}. Krížové nasadenie finalizujeme v engine. Konfigurácia sa uloží.</div>`;
  }
}

function createTournament(){
  if(wiz.players.length<2){ toast('Pridaj aspoň 2 hráčov.',true); return; }
  let ts=loadTournaments();
  const data={ name:wiz.name, sport:wiz.sport, discipline:wiz.discipline,
    date:wiz.date, venue:wiz.venue, format:wiz.format,
    players:wiz.players, playerCount:wiz.players.length, groups:wiz.groups, advance:wiz.advance };
  if(wiz.editId){
    ts=ts.map(t=> t.id===wiz.editId ? {...t, ...data, updated:new Date().toISOString()} : t);
    saveTournaments(ts);
    toast('Zmeny uložené ✓');
    const updated=ts.find(t=>t.id===wiz.editId);
    if(updated.format==='karty'){ setTimeout(()=>openTableGen(updated), 700); }
    else setTimeout(()=>go('detail', updated), 700);
  } else {
    const created={ id:'t'+Date.now(), ...data, created:new Date().toISOString() };
    ts.unshift(created);
    saveTournaments(ts);
    toast('Turnaj vytvorený ✓');
    if(created.format==='karty'){ setTimeout(()=>openTableGen(created), 700); }
    else setTimeout(()=>go('dashboard'), 700);
  }
}

function toast(msg,err){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'+(err?' err':''); setTimeout(()=>t.className='toast'+(err?' err':''),2200); }

/* ── INIT: no login/plan check here — this page assumes whoever links
   here (the "Nový turnaj" CTA elsewhere) already handled eligibility.
   Goes straight to the dashboard. ── */
go('dashboard');
</script>
